  <style>
    *{box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;}

    /* ── Card flip ── */
    .card-scene{
      perspective:600px;
      cursor:pointer;
    }
    .card-inner{
      position:relative;
      width:100%; height:100%;
      transform-style:preserve-3d;
      transition:transform .45s cubic-bezier(.4,0,.2,1);
    }
    .card-scene.flipped .card-inner{ transform:rotateY(180deg); }
    .card-face{
      position:absolute;
      inset:0;
      backface-visibility:hidden;
      border-radius:1rem;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .card-back{
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.1);
    }
    .dark .card-back{
      background:rgba(0,0,0,.05);
      border:1px solid rgba(0,0,0,.1);
    }
    .card-front{
      transform:rotateY(180deg);
    }

    /* ── Matched glow ── */
    .card-scene.matched .card-inner{
      animation:matchPop .35s ease both;
    }
    @keyframes matchPop{
      0%{transform:rotateY(180deg) scale(1);}
      50%{transform:rotateY(180deg) scale(1.12);}
      100%{transform:rotateY(180deg) scale(1);}
    }
    .card-scene.matched .card-front{
      border:2px solid rgba(34,211,238,.6);
      box-shadow:0 0 18px rgba(34,211,238,.35);
    }

    /* ── Wrong shake ── */
    .card-scene.wrong .card-inner{
      animation:wrongShake .35s ease both;
    }
    @keyframes wrongShake{
      0%,100%{transform:rotateY(180deg) translateX(0);}
      25%{transform:rotateY(180deg) translateX(-5px);}
      75%{transform:rotateY(180deg) translateX(5px);}
    }

    /* ── Combo badge ── */
    @keyframes comboPop{
      0%{opacity:0;transform:translateY(6px) scale(.8);}
      30%{opacity:1;transform:translateY(0) scale(1.15);}
      80%{opacity:1;transform:scale(1);}
      100%{opacity:0;transform:translateY(-8px) scale(.9);}
    }
    .combo-anim{ animation:comboPop 1.2s ease forwards; }

    /* ── Fade in ── */
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
    .fade-up{animation:fadeUp .4s cubic-bezier(.4,0,.2,1) both;}

    /* ── Win overlay ── */
    @keyframes overlayIn{from{opacity:0;}to{opacity:1;}}
    #win-overlay{ animation:overlayIn .3s ease both; }
    @keyframes modalIn{from{opacity:0;transform:scale(.92) translateY(16px);}to{opacity:1;transform:none;}}
    #win-modal{ animation:modalIn .4s cubic-bezier(.4,0,.2,1) .1s both; }

    /* ── Difficulty tab ── */
    .diff-tab{transition:all .2s;}
    .diff-tab.active{background:rgba(6,182,212,.18);color:#06b6d4;border-color:rgba(6,182,212,.35);}
    .dark .diff-tab.active{background:rgba(6,182,212,.15);color:#0891b2;border-color:rgba(6,182,212,.3);}
    .diff-tab:not(.active){color:rgba(255,255,255,.5);border-color:transparent;}
    .dark .diff-tab:not(.active){color:rgba(0,0,0,.4);border-color:transparent;}

    /* ── Stat card ── */
    .stat-card{
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      border-radius:1rem;
    }
    .dark .stat-card{
      background:rgba(0,0,0,.04);
      border:1px solid rgba(0,0,0,.08);
    }

    /* ── Timer warning ── */
    .timer-warn{ color:#f87171!important; animation:pulse 1s infinite; }
    @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.5;} }

    /* Scrollbar */
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:99px;}
  </style>
</head>

  <script>
    // ── Emoji sets ──
    const EMOJIS = [
      '🚀','🌈','🎸','🦊','🌺','🍕',
      '🎯','🦋','🌙','⚡','🎪','🦁',
      '🐬','🎨','🍦','🏆','🌊','🎭',
      '🦄','🎲'
    ];

    // ── Card gradients ──
    const GRADIENTS = [
      'from-cyan-500 to-blue-600',
      'from-violet-500 to-purple-600',
      'from-emerald-500 to-teal-600',
      'from-rose-500 to-pink-600',
      'from-amber-500 to-orange-500',
      'from-indigo-500 to-blue-700',
      'from-fuchsia-500 to-pink-600',
      'from-green-500 to-emerald-600',
      'from-sky-500 to-cyan-600',
      'from-red-500 to-rose-600',
      'from-yellow-500 to-amber-600',
      'from-teal-500 to-cyan-700',
      'from-purple-500 to-indigo-600',
      'from-pink-500 to-rose-600',
      'from-lime-500 to-green-600',
      'from-orange-500 to-red-600',
      'from-blue-500 to-indigo-700',
      'from-cyan-600 to-teal-700',
      'from-violet-600 to-fuchsia-600',
      'from-amber-600 to-yellow-600'
    ];

    // ── Difficulty config ──
    const DIFF = {
      easy:   { pairs:6,  cols:3, label:'Easy'   },
      medium: { pairs:8,  cols:4, label:'Medium'  },
      hard:   { pairs:10, cols:5, label:'Hard'    }
    };

    // ── State ──
    let diff       = 'easy';
    let cards      = [];
    let flipped    = [];
    let matched    = 0;
    let moves      = 0;
    let combo      = 0;
    let locked     = false;
    let timerID    = null;
    let seconds    = 0;
    let gameActive = false;

    // ── DOM ──
    const $board      = document.getElementById('board');
    const $time       = document.getElementById('stat-time');
    const $moves      = document.getElementById('stat-moves');
    const $matches    = document.getElementById('stat-matches');
    const $best       = document.getElementById('stat-best');
    const $combo      = document.getElementById('combo-badge');
    const $comboText  = document.getElementById('combo-text');

    // ── Theme ──
    (function(){
      document.getElementById('theme-icon').className =
        document.documentElement.classList.contains('dark') ? 'ri-sun-line text-lg' : 'ri-moon-line text-lg';
    })();
    function toggleTheme(){
      const dark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', dark ? 'dark' : 'light');
      document.getElementById('theme-icon').className = dark ? 'ri-sun-line text-lg' : 'ri-moon-line text-lg';
    }

    // ── Difficulty ──
    function setDiff(d){
      diff = d;
      ['easy','medium','hard'].forEach(x=>{
        document.getElementById('diff-'+x).classList.toggle('active', x===d);
      });
      initGame();
    }

    // ── Init ──
    function initGame(){
      clearInterval(timerID);
      seconds    = 0;
      moves      = 0;
      matched    = 0;
      combo      = 0;
      flipped    = [];
      locked     = false;
      gameActive = false;

      const cfg   = DIFF[diff];
      const pool  = shuffle([...EMOJIS]).slice(0, cfg.pairs);
      const grads = shuffle([...GRADIENTS]).slice(0, cfg.pairs);
      cards = shuffle([...pool,...pool].map((emoji,i)=>({ id:i, emoji, grad:grads[pool.indexOf(emoji)] })));

      updateStats();
      renderBoard();
      showBest();
      closeWin();
    }

    // ── Render board ──
    function renderBoard(){
      const cols = DIFF[diff].cols;
      $board.style.gridTemplateColumns = `repeat(${cols}, minmax(0,1fr))`;

      // Card size based on difficulty
      const h = diff==='hard' ? 'h-16 sm:h-20' : diff==='medium' ? 'h-20 sm:h-24' : 'h-24 sm:h-28';
      const emojiSize = diff==='hard' ? 'text-2xl' : diff==='medium' ? 'text-3xl' : 'text-4xl';

      $board.innerHTML = cards.map((c,i)=>`
        <div id="card-${i}" class="card-scene ${h}" onclick="flipCard(${i})" style="animation:fadeUp .3s ease ${i*30}ms both">
          <div class="card-inner">
            <div class="card-face card-back flex items-center justify-center">
              <i class="ri-question-mark text-2xl text-slate-500 dark:text-slate-400"></i>
            </div>
            <div class="card-face card-front bg-gradient-to-br ${c.grad} flex items-center justify-center shadow-lg">
              <span class="${emojiSize} select-none">${c.emoji}</span>
            </div>
          </div>
        </div>
      `).join('');
    }

    // ── Flip ──
    function flipCard(i){
      if (!gameActive){ startTimer(); gameActive=true; }
      const el = document.getElementById('card-'+i);
      if (locked || el.classList.contains('flipped') || el.classList.contains('matched')) return;
      el.classList.add('flipped');
      flipped.push(i);
      if (flipped.length === 2) check();
    }

    // ── Check match ──
    function check(){
      locked = true;
      moves++;
      $moves.textContent = moves;

      const [a, b] = flipped;
      const elA = document.getElementById('card-'+a);
      const elB = document.getElementById('card-'+b);

      if (cards[a].emoji === cards[b].emoji){
        // Match!
        combo++;
        matched++;
        $matches.textContent = matched;
        setTimeout(()=>{
          elA.classList.add('matched');
          elB.classList.add('matched');
          if (combo >= 2) showCombo(combo);
          flipped = [];
          locked  = false;
          if (matched === DIFF[diff].pairs) onWin();
        }, 300);
      } else {
        // No match
        combo = 0;
        elA.classList.add('wrong');
        elB.classList.add('wrong');
        setTimeout(()=>{
          elA.classList.remove('flipped','wrong');
          elB.classList.remove('flipped','wrong');
          flipped = [];
          locked  = false;
        }, 750);
      }
    }

    // ── Timer ──
    function startTimer(){
      clearInterval(timerID);
      timerID = setInterval(()=>{
        seconds++;
        const m = Math.floor(seconds/60);
        const s = seconds%60;
        $time.textContent = `${m}:${s.toString().padStart(2,'0')}`;
        if (seconds >= 90) $time.classList.add('timer-warn');
        else $time.classList.remove('timer-warn');
      }, 1000);
    }

    // ── Win ──
    function onWin(){
      clearInterval(timerID);
      gameActive = false;
      const score = Math.max(0, Math.floor(1000 + DIFF[diff].pairs*50 - moves*10 - seconds*2));
      const key   = 'memBest_'+diff;
      const prev  = parseInt(localStorage.getItem(key)||'9999');
      const isNew = seconds < prev;
      if (isNew) localStorage.setItem(key, seconds);

      const m = Math.floor(seconds/60);
      const s = seconds%60;
      const timeStr = `${m}:${s.toString().padStart(2,'0')}`;

      // Trophies by diff
      const trophy = diff==='hard'?'🏆':diff==='medium'?'🥈':'🥉';
      document.getElementById('win-trophy').textContent = trophy;
      document.getElementById('win-sub').textContent = `${DIFF[diff].label} mode — ${DIFF[diff].pairs} pairs matched!`;
      document.getElementById('win-time').textContent  = timeStr;
      document.getElementById('win-moves').textContent = moves;
      document.getElementById('win-score').textContent = score;
      document.getElementById('win-best-banner').classList.toggle('hidden', !isNew);

      showBest();
      setTimeout(()=>{ document.getElementById('win-overlay').classList.remove('hidden'); }, 400);
    }

    function closeWin(){
      document.getElementById('win-overlay').classList.add('hidden');
    }

    // ── Best time display ──
    function showBest(){
      const key  = 'memBest_'+diff;
      const best = parseInt(localStorage.getItem(key)||'0');
      if (!best){ $best.textContent='--'; return; }
      const m = Math.floor(best/60);
      const s = best%60;
      $best.textContent = `${m}:${s.toString().padStart(2,'0')}`;
    }

    // ── Update stats ──
    function updateStats(){
      $time.textContent    = '0:00';
      $moves.textContent   = '0';
      $matches.textContent = '0';
      $time.classList.remove('timer-warn');
    }

    // ── Combo badge ──
    function showCombo(n){
      const msgs = ['','','🔥 x2 Combo!','🔥🔥 x3 Streak!','⚡ x4 ON FIRE!','💥 x5 UNSTOPPABLE!'];
      $comboText.textContent = msgs[Math.min(n, msgs.length-1)];
      $combo.classList.remove('hidden');
      $combo.querySelector('div').classList.remove('combo-anim');
      void $combo.querySelector('div').offsetWidth;
      $combo.querySelector('div').classList.add('combo-anim');
      setTimeout(()=>$combo.classList.add('hidden'), 1300);
    }

    // ── Shuffle ──
    function shuffle(arr){
      for(let i=arr.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]]=[arr[j],arr[i]];
      }
      return arr;
    }

    // ── Keyboard shortcut: R = restart ──
    window.addEventListener('keydown', e=>{
      if (e.key==='r'||e.key==='R') initGame();
      if (e.key==='Escape') closeWin();
    });

    // ── Init ──
    initGame();
  </script>
</body>
</html>
