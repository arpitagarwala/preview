  <!--
    THEME INIT (runs before render to avoid flash)
    Convention: .dark on <html> = dark theme visually.
    localStorage 'theme' = 'dark' | 'light'.
    ?theme= URL param overrides on first load (cross-page sync).
  -->
  <script>
    (function () {
      var param = new URLSearchParams(window.location.search).get('theme');
      var stored = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

      var theme;
      if (param === 'dark' || param === 'light') {
        theme = param;
        localStorage.setItem('theme', theme);
      } else if (stored === 'dark' || stored === 'light') {
        theme = stored;
      } else {
        theme = prefersDark ? 'dark' : 'light';
      }

      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    })();
  </script>

<body class="min-h-screen bg-gray-50 dark:bg-slate-900 text-gray-900 dark:text-slate-100 transition-colors duration-300">

  <div class="max-w-5xl mx-auto px-3 py-8 pt-14">

    <!-- Header -->

        <input id="search-input" type="text" placeholder="Search by name, feature, or tag…"
               class="search-input w-full pl-9 pr-8 py-2.5 rounded-lg bg-gray-100 dark:bg-slate-700 text-gray-900 dark:text-slate-100 placeholder-gray-400 dark:placeholder-slate-400 border border-gray-200 dark:border-slate-600 transition-colors text-sm"
               oninput="handleSearch()" />
        <button id="clear-btn" onclick="clearSearch()" class="absolute right-2.5 top-1/2 -translate-y-1/2 text-gray-400 dark:text-slate-400 hover:text-gray-700 dark:hover:text-slate-200 transition-colors hidden">
          <i class="ri-close-circle-fill text-base"></i>
        </button>
      </div>
      <div class="flex flex-wrap gap-1.5 items-center">
        <span class="text-xs font-semibold text-gray-400 dark:text-slate-500 uppercase tracking-wider mr-1">Category:</span>
        <button class="filter-pill active text-xs font-medium px-2.5 py-1 rounded-full border border-gray-300 dark:border-slate-600 text-gray-600 dark:text-slate-300 hover:border-cyan-500 dark:hover:border-cyan-400 transition-all duration-150" data-cat="all" onclick="setFilter(this,'all')">All</button>
        <button class="filter-pill text-xs font-medium px-2.5 py-1 rounded-full border border-gray-300 dark:border-slate-600 text-gray-600 dark:text-slate-300 hover:border-cyan-500 dark:hover:border-cyan-400 transition-all duration-150" data-cat="Finance" onclick="setFilter(this,'Finance')"><i class="ri-funds-line mr-1"></i>Finance Tools</button>
        <button class="filter-pill text-xs font-medium px-2.5 py-1 rounded-full border border-gray-300 dark:border-slate-600 text-gray-600 dark:text-slate-300 hover:border-cyan-500 dark:hover:border-cyan-400 transition-all duration-150" data-cat="Utility" onclick="setFilter(this,'Utility')"><i class="ri-tools-line mr-1"></i>Utilities</button>
        <span id="result-count" class="ml-auto text-xs text-gray-400 dark:text-slate-500 font-medium whitespace-nowrap"></span>
      </div>

    <!-- Grid -->

  <script>
    const PROJECTS = [
      {
        href: 'sip.html', title: 'SIP Calculator',
        description: 'Simulate Systematic Investment Plans, compare two portfolios side-by-side, and visualize compound growth with Chart.js.',
        icon: 'ri-line-chart-line', gradient: 'from-cyan-500 to-blue-600',
        category: 'Finance', tags: ['Chart.js', 'Investing', 'Compound Interest'],
        complexity: 3, featured: true, cta: 'Open Calculator'
      },
      {
        href: 'budget.html', title: 'Budget Tracker',
        description: 'Log income and expenses, visualize spending with pie charts, and track savings goals — all stored locally per user.',
        icon: 'ri-pie-chart-2-line', gradient: 'from-emerald-500 to-teal-600',
        category: 'Finance', tags: ['Charts', 'Local Storage', 'Personal Finance'],
        complexity: 3, featured: false, cta: 'Open Tracker'
      },
      {
        href: 'expense-splitter.html', title: 'Expense Splitter',
        description: 'Split bills with friends using custom ratios, edit history on the fly, and export the final summary instantly.',
        icon: 'ri-group-line', gradient: 'from-violet-500 to-purple-600',
        category: 'Finance', tags: ['Bill Splitting', 'Export', 'Custom Ratios'],
        complexity: 2, featured: false, cta: 'Split Bills'
      },
      {
        href: 'calculator.html', title: 'Modern Calculator',
        description: 'A glassmorphism-styled calculator with full keyboard support, operator chaining, history log, and memory functions.',
        icon: 'ri-calculator-line', gradient: 'from-orange-500 to-red-500',
        category: 'Utility', tags: ['Keyboard Support', 'History Log', 'Memory Functions', 'Glassmorphism'],
        complexity: 3, featured: true, cta: 'Open Calculator'
      },
      {
        href: 'notepad.html', title: 'Notepad',
        description: 'A private, zero-server notepad that autosaves everything in your browser. No account, no cloud, no tracking.',
        icon: 'ri-sticky-note-line', gradient: 'from-yellow-500 to-amber-500',
        category: 'Utility', tags: ['Privacy First', 'Auto-save', 'Local Storage'],
        complexity: 1, featured: false, cta: 'Open Notepad'
      },
      {
        href: 'clock.html', title: 'Live Clock',
        description: 'A dual digital + analog clock with world clocks, floating settings panel, and theme toggle.',
        icon: 'ri-time-line', gradient: 'from-slate-400 to-slate-600',
        category: 'Utility', tags: ['Real-time', 'Analog + Digital', 'World Clocks'],
        complexity: 2, featured: false, cta: 'Open Clock'
      }
    ];

    let activeCategory = 'all', activeSearch = '';

    function renderProjects() {
      const grid = document.getElementById('projects-grid');
      const noResults = document.getElementById('no-results');
      const countEl = document.getElementById('result-count');
      const query = activeSearch.toLowerCase().trim();

      const filtered = PROJECTS.filter(p => {
        const matchCat = activeCategory === 'all' || p.category === activeCategory;
        const matchQ = !query
          || p.title.toLowerCase().includes(query)
          || p.description.toLowerCase().includes(query)
          || p.tags.some(t => t.toLowerCase().includes(query))
          || p.category.toLowerCase().includes(query);
        return matchCat && matchQ;
      });

      countEl.textContent = filtered.length === PROJECTS.length
        ? `${PROJECTS.length} projects`
        : `${filtered.length} of ${PROJECTS.length} projects`;

      if (filtered.length === 0) {
        grid.innerHTML = '';
        noResults.classList.add('visible');
        return;
      }
      noResults.classList.remove('visible');

      grid.innerHTML = filtered.map((p, i) => `
        <div class="project-card" style="animation-delay:${i * 55}ms">
          <a href="${p.href}" class="card-link h-full bg-white dark:bg-slate-800 rounded-xl border border-gray-200 dark:border-slate-700/50 hover:border-cyan-500 dark:hover:border-cyan-400 shadow-sm hover:shadow-xl flex flex-col overflow-hidden block">
            <div class="h-1 w-full bg-gradient-to-r ${p.gradient} flex-shrink-0"></div>
            <div class="p-4 sm:p-5 flex flex-col flex-1">
              <div class="flex items-start justify-between mb-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br ${p.gradient} flex items-center justify-center shadow-md">
                  <i class="${p.icon} text-xl text-white"></i>
                </div>
                ${p.featured ? `<span class="text-xs font-bold px-2 py-0.5 rounded-full border border-cyan-400/40 dark:border-cyan-500/30 bg-cyan-50 dark:bg-cyan-900/20 flex items-center gap-1"><span class="featured-text">⭐ Featured</span></span>` : ''}
              </div>
              <h2 class="text-sm font-bold text-gray-900 dark:text-slate-100 mb-0.5">${p.title}</h2>
              <span class="text-xs text-gray-400 dark:text-slate-400 mb-2 flex items-center gap-1">
                <i class="${p.category === 'Finance' ? 'ri-funds-line' : 'ri-tools-line'}"></i>
                ${p.category === 'Finance' ? 'Finance Tool' : 'Utility'}
              </span>
              <p class="text-xs text-gray-500 dark:text-slate-400 leading-relaxed mb-3 flex-1">${p.description}</p>
              <div class="flex flex-wrap gap-1 mb-3">
                ${p.tags.map(t => `<span class="text-xs bg-gray-100 dark:bg-slate-700 text-gray-600 dark:text-slate-300 px-2 py-0.5 rounded-full">${t}</span>`).join('')}
              </div>
              <div class="flex items-center justify-between pt-2.5 border-t border-gray-100 dark:border-slate-700/50">
                <div class="flex items-center gap-1">
                  <span class="text-xs text-gray-400 dark:text-slate-500 mr-1">Complexity</span>
                  ${[1, 2, 3].map(d => `<span class="w-1.5 h-1.5 rounded-full ${d <= p.complexity ? 'dot-on' : 'dot-off'}"></span>`).join('')}
                </div>
                <span class="text-xs font-semibold text-cyan-600 dark:text-cyan-400 flex items-center gap-1">${p.cta} <i class="ri-arrow-right-line"></i></span>
              </div>
            </div>
          </a>
        </div>
      `).join('');
    }

    function handleSearch() {
      activeSearch = document.getElementById('search-input').value;
      document.getElementById('clear-btn').classList.toggle('hidden', !activeSearch);
      renderProjects();
    }

    function clearSearch() {
      document.getElementById('search-input').value = '';
      activeSearch = '';
      document.getElementById('clear-btn').classList.add('hidden');
      renderProjects();
    }

    function setFilter(btn, cat) {
      activeCategory = cat;
      document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      renderProjects();
    }

    /* ── Theme helpers ── */
    // .dark on <html> = dark theme. No .dark = light theme. Simple & standard.
    function isDark() {
      return document.documentElement.classList.contains('dark');
    }

    function syncIcon() {
      // Moon icon on light theme (click to go dark), Sun icon on dark theme (click to go light)
      document.getElementById('theme-icon').className = isDark() ? 'ri-sun-line text-lg' : 'ri-moon-line text-lg';
    }

    function updateBackLink() {
      var a = document.getElementById('back-link');
      if (a) a.href = 'index.html?theme=' + (isDark() ? 'dark' : 'light');
    }

    function toggleTheme() {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', isDark() ? 'dark' : 'light');
      syncIcon();
      updateBackLink();
    }

    syncIcon();
    updateBackLink();
    renderProjects();
  </script>
</body>
