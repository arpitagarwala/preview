  <script>
    (function () {

  <script src="https://cdn.tailwindcss.com"></script>

  <script>tailwind.config = { darkMode: 'class' }</script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body { font-family: 'Inter', sans-serif; }

    /* SVG draw-on animations */
    .x-line {
      stroke-dasharray: 50;
      stroke-dashoffset: 50;
      animation: drawLine 0.22s ease forwards;
    }
    .x-line:nth-child(2) { animation-delay: 0.12s; }
    .o-circle {
      stroke-dasharray: 108;
      stroke-dashoffset: 108;
      animation: drawLine 0.35s ease forwards;
    }
    @keyframes drawLine {
      to { stroke-dashoffset: 0; }
    }

    /* Cell */
    .cell {
      cursor: pointer;
      transition: background-color 0.15s ease, transform 0.1s ease, border-color 0.15s ease;
      border-radius: 0.875rem;
      border: 1.5px solid rgba(255,255,255,0.07);
      background: rgba(17,24,39,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      aspect-ratio: 1;
    }
    .dark .cell { background: #f8fafc; border-color: #e5e7eb; }
    .cell:hover:not(.taken) { background: rgba(34,211,238,0.08); border-color: rgba(34,211,238,0.3); }
    .dark .cell:hover:not(.taken) { background: rgba(34,211,238,0.05); border-color: rgba(34,211,238,0.25); }
    .cell:active:not(.taken) { transform: scale(0.93); }
    .cell.win-cell {
      background: rgba(34,211,238,0.12) !important;
      border-color: rgba(34,211,238,0.5) !important;
      box-shadow: 0 0 18px rgba(34,211,238,0.15);
    }
    .dark .cell.win-cell { background: rgba(34,211,238,0.07) !important; }

    /* Mode toggle pills */
    .mode-pill {
      transition: all 0.15s ease;
    }
    .mode-pill.active {
      background: #22d3ee; color: #0f172a; border-color: #22d3ee;
    }
    .dark .mode-pill.active {
      background: #0891b2; color: #fff; border-color: #0891b2;
    }

    /* Score pop */
    @keyframes scorePop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.4); }
      100% { transform: scale(1); }
    }
    .pop { animation: scorePop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

    /* Result overlay */
    @keyframes overlayIn {
      from { opacity: 0; transform: scale(0.85) translateY(12px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    #overlay-card { animation: overlayIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }

    /* Confetti */
    @keyframes confettiFall {
      0%   { transform: translateY(-30px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(540deg); opacity: 0; }
    }
    .confetti {
      position: fixed; pointer-events: none; z-index: 300;
      width: 7px; height: 7px; border-radius: 2px;
      animation: confettiFall linear forwards;
    }

    /* Turn pulse */
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .pulse { animation: pulse 1.2s ease infinite; }
  </style>
</head>

<body class="min-h-screen bg-[#080c14] dark:bg-slate-100 text-slate-100 dark:text-gray-900 transition-colors duration-300">

      <h2 id="ov-title" class="text-2xl font-extrabold text-white dark:text-gray-900 mb-1"></h2>
      <p id="ov-sub" class="text-sm text-slate-400 dark:text-gray-500 mb-6"></p>

  <!-- Page Content -->
  <div class="max-w-sm mx-auto px-4 py-8 pt-16 flex flex-col items-center gap-4">

    <!-- Header -->
    <div class="text-center w-full">
      <h1 class="text-2xl sm:text-3xl font-extrabold tracking-tight">Tic Tac Toe</h1>
      <p class="text-xs text-slate-500 dark:text-gray-400 mt-0.5">Outwit your opponent on a 3×3 grid.</p>
    </div>

    <!-- Mode + Symbol -->
    <div class="w-full bg-slate-900/50 dark:bg-white rounded-2xl border border-slate-700/50 dark:border-gray-200 p-4 flex flex-col gap-3 shadow-sm">
      <!-- Mode -->
      <div class="flex items-center gap-2">
        <span class="text-[10px] font-bold text-slate-500 dark:text-gray-400 uppercase tracking-widest w-14 shrink-0">Mode</span>
        <div class="flex gap-2 flex-1">
          <button id="btn-pvp" onclick="setMode('pvp')" class="mode-pill active flex-1 text-xs font-semibold px-3 py-2 rounded-lg border border-slate-600 dark:border-gray-300 text-slate-300 dark:text-gray-600">
            <i class="ri-group-line mr-1"></i>2 Players
          </button>
          <button id="btn-ai" onclick="setMode('ai')" class="mode-pill flex-1 text-xs font-semibold px-3 py-2 rounded-lg border border-slate-600 dark:border-gray-300 text-slate-300 dark:text-gray-600">
            <i class="ri-robot-line mr-1"></i>vs AI
          </button>
        </div>
      </div>
      <!-- Symbol (only visible in AI mode) -->
      <div id="sym-row" class="flex items-center gap-2" style="opacity:0.35;pointer-events:none">
        <span class="text-[10px] font-bold text-slate-500 dark:text-gray-400 uppercase tracking-widest w-14 shrink-0">You are</span>
        <div class="flex gap-2 flex-1">
          <button id="btn-sx" onclick="setSymbol('X')" class="mode-pill active flex-1 text-xs font-semibold px-3 py-2 rounded-lg border border-slate-600 dark:border-gray-300 text-slate-300 dark:text-gray-600">
            ✕ X · First
          </button>
          <button id="btn-so" onclick="setSymbol('O')" class="mode-pill flex-1 text-xs font-semibold px-3 py-2 rounded-lg border border-slate-600 dark:border-gray-300 text-slate-300 dark:text-gray-600">
            ○ O · Second
          </button>
        </div>
      </div>
    </div>

    <!-- Scoreboard -->
    <div class="w-full grid grid-cols-3 gap-2">
      <div class="bg-slate-900/50 dark:bg-white rounded-xl border border-slate-700/50 dark:border-gray-200 p-3 text-center shadow-sm">
        <p id="lbl-x" class="text-[10px] font-bold uppercase tracking-widest text-slate-500 dark:text-gray-400 mb-1">Player X</p>
        <p id="sc-x" class="text-2xl font-black text-cyan-400 dark:text-cyan-600">0</p>
      </div>
      <div class="bg-slate-900/50 dark:bg-white rounded-xl border border-slate-700/50 dark:border-gray-200 p-3 text-center shadow-sm">
        <p class="text-[10px] font-bold uppercase tracking-widest text-slate-500 dark:text-gray-400 mb-1">Draws</p>
        <p id="sc-d" class="text-2xl font-black text-slate-400 dark:text-gray-400">0</p>
      </div>
      <div class="bg-slate-900/50 dark:bg-white rounded-xl border border-slate-700/50 dark:border-gray-200 p-3 text-center shadow-sm">
        <p id="lbl-o" class="text-[10px] font-bold uppercase tracking-widest text-slate-500 dark:text-gray-400 mb-1">Player O</p>
        <p id="sc-o" class="text-2xl font-black text-violet-400 dark:text-violet-600">0</p>
      </div>
    </div>

    <!-- Status bar -->
    <div class="w-full bg-slate-900/50 dark:bg-white rounded-xl border border-slate-700/50 dark:border-gray-200 px-4 py-2.5 flex items-center justify-center gap-2 text-sm font-semibold shadow-sm">
      <span id="turn-dot" class="w-2.5 h-2.5 rounded-full bg-cyan-400 dark:bg-cyan-600 pulse"></span>
      <span id="status-txt">X's turn</span>
    </div>

    <!-- Board -->
    <div id="board" class="grid grid-cols-3 gap-2.5 w-full"></div>

    <!-- Controls -->
    <div class="flex gap-2.5 w-full">
      <button onclick="newRound()" class="flex-1 flex items-center justify-center gap-1.5 py-2.5 rounded-xl bg-slate-800/60 dark:bg-white border border-slate-700 dark:border-gray-200 hover:border-cyan-400 dark:hover:border-cyan-400 text-slate-300 dark:text-gray-600 text-xs font-semibold transition-all">
        <i class="ri-refresh-line"></i>New Round
      </button>
      <button onclick="resetAll()" class="flex-1 flex items-center justify-center gap-1.5 py-2.5 rounded-xl bg-slate-800/60 dark:bg-white border border-slate-700 dark:border-gray-200 hover:border-red-400 dark:hover:border-red-400 text-slate-300 dark:text-gray-600 text-xs font-semibold transition-all">
        <i class="ri-delete-bin-line"></i>Reset Scores
      </button>
    </div>

    <p class="text-xs text-slate-600 dark:text-gray-400">&copy; 2026 Arpit Agarwala — Engineered with <span class="text-red-400">&#10084;&#65039;</span></p>
  </div>

  <script>
    // ===== STATE =====
    let board       = Array(9).fill(null);
    let current     = 'X';
    let gameActive  = true;
    let mode        = 'pvp';
    let humanSym    = 'X';
    let scores      = { X:0, O:0, D:0 };

    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    // ===== BOARD =====
    function buildBoard() {
      const el = document.getElementById('board');
      el.innerHTML = '';
      board = Array(9).fill(null);
      current = 'X';
      gameActive = true;
      updateStatus();
      for (let i = 0; i < 9; i++) {
        const c = document.createElement('div');
        c.className = 'cell';
        c.dataset.i = i;
        c.addEventListener('click', () => onCellClick(i));
        el.appendChild(c);
      }
      if (mode === 'ai' && humanSym === 'O') setTimeout(doAI, 420);
    }

    function onCellClick(i) {
      if (!gameActive || board[i]) return;
      if (mode === 'ai' && current !== humanSym) return;
      move(i);
      if (gameActive && mode === 'ai') setTimeout(doAI, 380);
    }

    function move(i) {
      if (!gameActive || board[i]) return;
      board[i] = current;
      renderMark(i, current);
      const w = winner();
      if (w) {
        w.line.forEach(idx => cell(idx).classList.add('win-cell'));
        setTimeout(() => endGame('win', w.sym), 480);
        gameActive = false;
        return;
      }
      if (board.every(Boolean)) {
        setTimeout(() => endGame('draw', null), 480);
        gameActive = false;
        return;
      }
      current = current === 'X' ? 'O' : 'X';
      updateStatus();
    }

    function cell(i) { return document.querySelector(`[data-i="${i}"]`); }

    // ===== RENDER MARK (SVG) =====
    function renderMark(i, sym) {
      const c = cell(i);
      c.classList.add('taken');
      if (sym === 'X') {
        c.innerHTML = `<svg viewBox="0 0 50 50" width="55%" height="55%" fill="none">
          <line x1="11" y1="11" x2="39" y2="39" class="x-line" stroke="#22d3ee" stroke-width="5.5" stroke-linecap="round"/>
          <line x1="39" y1="11" x2="11" y2="39" class="x-line" stroke="#22d3ee" stroke-width="5.5" stroke-linecap="round"/>
        </svg>`;
      } else {
        c.innerHTML = `<svg viewBox="0 0 50 50" width="55%" height="55%" fill="none">
          <circle cx="25" cy="25" r="17" class="o-circle" stroke="#a78bfa" stroke-width="5.5" stroke-linecap="round"/>
        </svg>`;
      }
    }

    // ===== WIN CHECK =====
    function winner() {
      for (const [a,b,c] of WINS)
        if (board[a] && board[a] === board[b] && board[a] === board[c])
          return { sym: board[a], line: [a,b,c] };
      return null;
    }

    // ===== STATUS BAR =====
    function updateStatus() {
      const dot = document.getElementById('turn-dot');
      const txt = document.getElementById('status-txt');
      dot.className = `w-2.5 h-2.5 rounded-full pulse ${current==='X' ? 'bg-cyan-400 dark:bg-cyan-600' : 'bg-violet-400 dark:bg-violet-600'}`;
      if (mode === 'ai') {
        txt.textContent = current === humanSym ? `Your turn (${humanSym})` : 'AI is thinking…';
      } else {
        txt.textContent = `${current}'s turn`;
      }
    }

    // ===== END GAME =====
    function endGame(type, sym) {
      const overlay  = document.getElementById('overlay');
      const emoji    = document.getElementById('ov-emoji');
      const title    = document.getElementById('ov-title');
      const sub      = document.getElementById('ov-sub');

      if (type === 'win') {
        scores[sym]++;
        bumpScore(sym);
        if (mode === 'ai') {
          const won = sym === humanSym;
          emoji.textContent  = won ? '🎉' : '🤖';
          title.textContent  = won ? 'You Won!' : 'AI Wins!';
          sub.textContent    = won ? 'Brilliant! You outsmarted the AI.' : 'The AI wins this round. Try again!';
        } else {
          emoji.textContent = '🏆';
          title.textContent = `Player ${sym} Wins!`;
          sub.textContent   = `Nice game! ${sym} takes the round.`;
        }
        if (sym === humanSym || mode === 'pvp') launchConfetti();
      } else {
        scores.D++;
        bumpScore('D');
        emoji.textContent = '🤝';
        title.textContent = "It's a Draw!";
        sub.textContent   = 'Well played by both sides!';
      }

      overlay.style.display = 'flex';
    }

    function bumpScore(s) {
      const map = { X:'sc-x', O:'sc-o', D:'sc-d' };
      const el = document.getElementById(map[s]);
      el.textContent = scores[s];
      el.classList.remove('pop');
      void el.offsetWidth;
      el.classList.add('pop');
    }

    // ===== CONFETTI =====
    function launchConfetti() {
      const colors = ['#22d3ee','#a78bfa','#34d399','#f472b6','#fbbf24','#fb923c'];
      for (let k = 0; k < 48; k++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.cssText = `left:${Math.random()*100}vw;top:-15px;background:${colors[k%colors.length]};animation-duration:${1.3+Math.random()*1.6}s;animation-delay:${Math.random()*0.6}s;`;
        document.body.appendChild(el);
        el.addEventListener('animationend', ()=>el.remove());
      }
    }

    // ===== AI (Minimax) =====
    function doAI() {
      if (!gameActive) return;
      const aiSym = humanSym === 'X' ? 'O' : 'X';
      const best  = minimax([...board], true, aiSym, humanSym, 0);
      move(best.idx);
    }

    function minimax(b, isMax, aiS, huS, depth) {
      const w = evalBoard(b, aiS, huS);
      if (w !== null) return { score: w };
      if (b.every(Boolean)) return { score: 0 };

      let best = { score: isMax ? -Infinity : Infinity, idx: -1 };
      for (let i = 0; i < 9; i++) {
        if (b[i]) continue;
        b[i] = isMax ? aiS : huS;
        const res = minimax(b, !isMax, aiS, huS, depth + 1);
        b[i] = null;
        const s = res.score + (isMax ? -1 : 1) * depth * 0.05;
        if (isMax ? s > best.score : s < best.score) best = { score: s, idx: i };
      }
      return best;
    }

    function evalBoard(b, aiS, huS) {
      for (const [a,c,d] of WINS)
        if (b[a] && b[a] === b[c] && b[a] === b[d])
          return b[a] === aiS ? 10 : -10;
      return null;
    }

    // ===== CONTROLS =====
    function newRound() {
      document.getElementById('overlay').style.display = 'none';
      buildBoard();
    }
    function resetAll() {
      scores = { X:0, O:0, D:0 };
      ['sc-x','sc-o','sc-d'].forEach(id => document.getElementById(id).textContent = '0');
      document.getElementById('overlay').style.display = 'none';
      buildBoard();
    }

    function setMode(m) {
      mode = m;
      document.getElementById('btn-pvp').classList.toggle('active', m==='pvp');
      document.getElementById('btn-ai').classList.toggle('active', m==='ai');
      const sr = document.getElementById('sym-row');
      sr.style.opacity = m==='ai' ? '1' : '0.35';
      sr.style.pointerEvents = m==='ai' ? 'auto' : 'none';
      updateLabels();
      resetAll();
    }

    function setSymbol(s) {
      humanSym = s;
      document.getElementById('btn-sx').classList.toggle('active', s==='X');
      document.getElementById('btn-so').classList.toggle('active', s==='O');
      updateLabels();
      buildBoard();
    }

    function updateLabels() {
      const lx = document.getElementById('lbl-x');
      const lo = document.getElementById('lbl-o');
      if (mode === 'ai') {
        lx.textContent = humanSym === 'X' ? 'You (X)' : 'AI (X)';
        lo.textContent = humanSym === 'O' ? 'You (O)' : 'AI (O)';
      } else {
        lx.textContent = 'Player X';
        lo.textContent = 'Player O';
      }
    }

    // ===== THEME =====
    (function() {
      document.getElementById('theme-icon').className =
        document.documentElement.classList.contains('dark') ? 'ri-sun-line text-lg' : 'ri-moon-line text-lg';
    })();
    function toggleTheme() {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
      document.getElementById('theme-icon').className =
        document.documentElement.classList.contains('dark') ? 'ri-sun-line text-lg' : 'ri-moon-line text-lg';
    }

    // ===== INIT =====
    setMode('pvp');
  </script>
