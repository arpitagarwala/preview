  <!--
    THEME INIT (runs before render to avoid flash)
    Convention: .dark on <html> = dark theme visually.
    localStorage 'theme' = 'dark' | 'light'.
    ?theme= URL param overrides on first load (cross-page sync).
  -->
  <script>
    (function () {
      var param = new URLSearchParams(window.location.search).get('theme');
      var stored = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

      var theme;
      if (param === 'dark' || param === 'light') {
        theme = param;
        localStorage.setItem('theme', theme);
      } else if (stored === 'dark' || stored === 'light') {
        theme = stored;
      } else {
        theme = prefersDark ? 'dark' : 'light';
      }

      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    })();
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<!--
  TAILWIND DARK: CLASSES ARE NOW CORRECT:
  No dark: prefix = light theme styles
  dark:           = dark theme styles
-->
<body class="min-h-screen bg-gray-50 dark:bg-slate-900 text-gray-900 dark:text-slate-100 transition-colors duration-300">

  <!-- Back Button -->
  <div class="fixed top-3 left-3 z-50">
    <a id="back-link" href="index.html" class="bg-white dark:bg-slate-700 text-gray-700 dark:text-slate-200 p-1.5 rounded-full shadow-md inline-flex items-center border border-gray-200 dark:border-slate-600 hover:border-cyan-500 dark:hover:border-cyan-400 hover:shadow-lg transition-all duration-100">
      <i class="ri-arrow-left-line text-lg"></i>
    </a>
  </div>

  <!-- Theme Toggle -->
  <div class="fixed top-3 right-3 z-50">
    <button onclick="toggleTheme()" class="bg-white dark:bg-slate-700 text-gray-700 dark:text-slate-200 p-1.5 rounded-full shadow-md border border-gray-200 dark:border-slate-600 hover:border-cyan-500 dark:hover:border-cyan-400 hover:shadow-lg transition-all duration-100">
      <i id="theme-icon" class="ri-moon-line text-lg"></i>
    </button>
  </div>

  <div class="max-w-5xl mx-auto px-3 py-8 pt-14">

    <!-- Header -->
    <div class="mb-5">
      <h1 class="text-3xl sm:text-4xl font-extrabold text-gray-900 dark:text-slate-100 tracking-tight mb-1">&#x1F3AE; Games</h1>
      <p class="text-gray-500 dark:text-slate-400 text-sm max-w-xl">Fun, interactive games — classics reimagined with a fresh coat of design. Play, learn, challenge yourself.</p>
    </div>

    <!-- Stats bar -->
    <div class="flex flex-wrap gap-3 mb-5">
      <div class="flex items-center gap-2 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700/50 rounded-xl px-4 py-2.5 text-sm shadow-sm">
        <i class="ri-gamepad-line text-cyan-600 dark:text-cyan-400"></i>
        <span id="total-count" class="font-bold text-gray-900 dark:text-white">0</span>
        <span class="text-gray-500 dark:text-slate-400">Games Available</span>
      </div>
      <div class="flex items-center gap-2 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700/50 rounded-xl px-4 py-2.5 text-sm shadow-sm">
        <i class="ri-add-circle-line text-emerald-600 dark:text-emerald-400"></i>
        <span class="text-gray-500 dark:text-slate-400">More Coming Soon</span>
      </div>
    </div>

    <!-- Search -->
    <div class="bg-white dark:bg-slate-800 rounded-xl border border-gray-200 dark:border-slate-700/50 p-3 sm:p-4 mb-5 shadow-sm">
      <div class="relative">
        <i class="ri-search-line absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 dark:text-slate-400 text-base pointer-events-none"></i>
        <input id="search-input" type="text" placeholder="Search games by name, genre, or tag…"
          class="search-input w-full pl-9 pr-9 py-2.5 rounded-lg bg-gray-100 dark:bg-slate-700 text-gray-900 dark:text-slate-100 placeholder-gray-400 dark:placeholder-slate-400 border border-gray-200 dark:border-slate-600 transition-colors text-sm"
          oninput="handleSearch()" />
        <button id="clear-btn" onclick="clearSearch()" class="absolute right-2.5 top-1/2 -translate-y-1/2 text-gray-400 dark:text-slate-400 hover:text-gray-700 dark:hover:text-slate-200 transition-colors hidden">
          <i class="ri-close-circle-fill text-base"></i>
        </button>
      </div>
      <div class="flex items-center justify-between mt-2 px-0.5">
        <span class="text-xs text-gray-400 dark:text-slate-500">Tip: try "classic" or "2 player" or "memory"</span>
        <span id="result-count" class="text-xs text-gray-400 dark:text-slate-500 font-medium"></span>
      </div>
    </div>

    <!-- Grid -->
    <div id="games-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3"></div>

    <!-- Empty State -->
    <div id="no-results" class="flex-col items-center justify-center py-16 text-center">
      <i class="ri-search-eye-line text-4xl text-gray-300 dark:text-slate-600 mb-3"></i>
      <h3 class="text-lg font-bold text-gray-500 dark:text-slate-400 mb-2">No games found.</h3>
      <p class="text-gray-400 dark:text-slate-500 text-sm mb-3">Try a different search term.</p>
      <button onclick="clearSearch()" class="text-sm text-cyan-600 dark:text-cyan-400 hover:underline font-medium">Clear search</button>
    </div>

    <!-- Footer -->
    <div class="mt-8 bg-white dark:bg-slate-800 text-gray-400 dark:text-slate-400 rounded-xl border border-gray-200 dark:border-slate-700/50 px-5 py-3 text-xs text-center shadow-sm">
      &copy; 2026 Arpit Agarwala. Engineered with <span class="text-red-400">&#10084;&#65039;</span>
    </div>
  </div>

  <script>
    const GAMES = [
      {
        href: 'tictactoe.html',
        title: 'Tic Tac Toe',
        description: 'The classic 3×3 grid strategy game. Battle a friend locally or challenge the unbeatable AI powered by the Minimax algorithm. Track scores across rounds.',
        icon: 'ri-layout-grid-line',
        gradient: 'from-cyan-500 to-blue-600',
        genre: 'Classic',
        tags: ['2 Player', 'vs AI', 'Minimax', 'Strategy'],
        difficulty: 2,
        featured: true,
        players: '1–2',
        cta: 'Play Now'
      },
      {
        href: 'memory.html',
        title: 'Memory Cards',
        description: 'Flip and match all emoji pairs before time flies! Three difficulty levels, combo streaks, best time tracking, and smooth 3D card animations.',
        icon: 'ri-stack-line',
        gradient: 'from-violet-500 to-purple-600',
        genre: 'Memory',
        tags: ['Solo', 'Brain', 'Combos', 'Timer'],
        difficulty: 1,
        featured: true,
        players: '1',
        cta: 'Play Now'
      }
    ];

    let activeSearch = '';

    function renderGames() {
      const grid    = document.getElementById('games-grid');
      const noRes   = document.getElementById('no-results');
      const countEl = document.getElementById('result-count');
      const totalEl = document.getElementById('total-count');
      const q       = activeSearch.toLowerCase().trim();

      const filtered = GAMES.filter(g =>
        !q || g.title.toLowerCase().includes(q)
           || g.description.toLowerCase().includes(q)
           || g.tags.some(t => t.toLowerCase().includes(q))
           || g.genre.toLowerCase().includes(q)
      );

      totalEl.textContent = GAMES.length;
      countEl.textContent = filtered.length === GAMES.length
        ? `${GAMES.length} game${GAMES.length !== 1 ? 's' : ''}`
        : `${filtered.length} of ${GAMES.length}`;

      if (filtered.length === 0) { grid.innerHTML = ''; noRes.classList.add('visible'); return; }
      noRes.classList.remove('visible');

      grid.innerHTML = filtered.map((g, i) => `
        <div class="game-card" style="animation-delay:${i * 55}ms">
          <a href="${g.href}" class="card-link h-full bg-white dark:bg-slate-800 rounded-xl border border-gray-200 dark:border-slate-700/50 hover:border-cyan-500 dark:hover:border-cyan-400 shadow-sm hover:shadow-xl flex flex-col overflow-hidden block">
            <div class="h-1 w-full bg-gradient-to-r ${g.gradient} flex-shrink-0"></div>
            <div class="p-4 sm:p-5 flex flex-col flex-1">
              <div class="flex items-start justify-between mb-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br ${g.gradient} flex items-center justify-center shadow-md">
                  <i class="${g.icon} text-xl text-white"></i>
                </div>
                ${g.featured ? `<span class="text-xs font-bold px-2 py-0.5 rounded-full border border-cyan-400/40 dark:border-cyan-500/30 bg-cyan-50 dark:bg-cyan-900/20 flex items-center gap-1"><span class="featured-text">\u2B50 Featured</span></span>` : ''}
              </div>
              <h2 class="text-sm font-bold text-gray-900 dark:text-slate-100 mb-0.5">${g.title}</h2>
              <span class="text-xs text-gray-400 dark:text-slate-400 mb-2 flex items-center gap-3">
                <span class="flex items-center gap-1"><i class="ri-gamepad-line"></i> ${g.genre}</span>
                <span class="flex items-center gap-1"><i class="ri-user-line"></i> ${g.players} Player${g.players !== '1' ? 's' : ''}</span>
              </span>
              <p class="text-xs text-gray-500 dark:text-slate-400 leading-relaxed mb-3 flex-1">${g.description}</p>
              <div class="flex flex-wrap gap-1 mb-3">
                ${g.tags.map(t => `<span class="text-xs bg-gray-100 dark:bg-slate-700 text-gray-600 dark:text-slate-300 px-2 py-0.5 rounded-full">${t}</span>`).join('')}
              </div>
              <div class="flex items-center justify-between pt-2.5 border-t border-gray-100 dark:border-slate-700/50">
                <div class="flex items-center gap-1">
                  <span class="text-xs text-gray-400 dark:text-slate-500 mr-1">Difficulty</span>
                  ${[1, 2, 3].map(d => `<span class="w-1.5 h-1.5 rounded-full ${d <= g.difficulty ? 'dot-on' : 'dot-off'}"></span>`).join('')}
                </div>
                <span class="text-xs font-semibold text-cyan-600 dark:text-cyan-400 flex items-center gap-1">${g.cta} <i class="ri-arrow-right-line"></i></span>
              </div>
            </div>
          </a>
        </div>
      `).join('');
    }

    function handleSearch() {
      activeSearch = document.getElementById('search-input').value;
      document.getElementById('clear-btn').classList.toggle('hidden', !activeSearch);
      renderGames();
    }

    function clearSearch() {
      document.getElementById('search-input').value = '';
      activeSearch = '';
      document.getElementById('clear-btn').classList.add('hidden');
      renderGames();
    }

    /* ── Theme helpers ── */
    function isDark() {
      return document.documentElement.classList.contains('dark');
    }

    function syncIcon() {
      document.getElementById('theme-icon').className = isDark() ? 'ri-sun-line text-lg' : 'ri-moon-line text-lg';
    }

    function updateBackLink() {
      var a = document.getElementById('back-link');
      if (a) a.href = 'index.html?theme=' + (isDark() ? 'dark' : 'light');
    }

    function toggleTheme() {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', isDark() ? 'dark' : 'light');
      syncIcon();
      updateBackLink();
    }

    syncIcon();
    updateBackLink();
    renderGames();
  </script>
</body>
