<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" sizes="32x32" href="https://res.cloudinary.com/dxsja3wy5/image/upload/w_32,h_32,c_fill,q_auto,f_png/v1772863840/tab-icon.png">
  <link rel="icon" type="image/png" sizes="16x16" href="https://res.cloudinary.com/dxsja3wy5/image/upload/w_16,h_16,c_fill,q_auto,f_png/v1772863840/tab-icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="https://res.cloudinary.com/dxsja3wy5/image/upload/w_180,h_180,c_fill,q_auto,f_png/v1772863840/tab-icon.png">
  <link rel="shortcut icon" href="https://res.cloudinary.com/dxsja3wy5/image/upload/w_32,h_32,c_fill,q_auto,f_png/v1772863840/tab-icon.png">
  <title>Games – Arpit Agarwala</title>

  <script>
    (function () {
      const t = localStorage.getItem('theme');
      if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches))
        document.documentElement.classList.add('dark');
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <script>tailwind.config = { darkMode: 'class' }</script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body { font-family: 'Inter', sans-serif; }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(10px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }
    .game-card { animation: cardIn 0.25s ease both; }

    .search-input:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(34,211,238,0.18);
      border-color: #22d3ee;
    }
    .dark .search-input:focus {
      box-shadow: 0 0 0 3px rgba(8,145,178,0.2);
      border-color: #0891b2;
    }

    .card-link { transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease; }
    .card-link:hover { transform: translateY(-3px); }

    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }
    .featured-text {
      background: linear-gradient(90deg,#22d3ee 0%,#a5f3fc 40%,#22d3ee 70%,#0891b2 100%);
      background-size: 200% auto;
      animation: shimmer 3s linear infinite;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .dot-on  { background-color: #22d3ee; }
    .dot-off { background-color: #334155; }
    .dark .dot-off { background-color: #e5e7eb; }

    #no-results { display: none; }
    #no-results.visible { display: flex; }
  </style>
</head>

<body class="min-h-screen bg-slate-900 dark:bg-gray-50 text-slate-100 dark:text-gray-900 transition-colors duration-300">

  <div class="fixed top-3 left-3 z-50">
    <a href="index.html" class="bg-slate-700 dark:bg-white text-slate-200 dark:text-gray-700 p-1.5 rounded-full shadow-md inline-flex items-center border border-slate-600 dark:border-gray-200 hover:border-cyan-400 dark:hover:border-cyan-400 hover:shadow-lg transition-all duration-100">
      <i class="ri-arrow-left-line text-lg"></i>
    </a>
  </div>

  <div class="fixed top-3 right-3 z-50">
    <button onclick="toggleTheme()" class="bg-slate-700 dark:bg-white text-slate-200 dark:text-gray-700 p-1.5 rounded-full shadow-md border border-slate-600 dark:border-gray-200 hover:border-cyan-400 dark:hover:border-cyan-400 hover:shadow-lg transition-all duration-100">
      <i id="theme-icon" class="ri-sun-line text-lg"></i>
    </button>
  </div>

  <div class="max-w-5xl mx-auto px-3 py-8 pt-14">

    <div class="mb-5">
      <h1 class="text-3xl sm:text-4xl font-extrabold text-slate-100 dark:text-gray-900 tracking-tight mb-1">&#x1F3AE; Games</h1>
      <p class="text-slate-400 dark:text-gray-500 text-sm max-w-xl">Fun, interactive games — classics reimagined with a fresh coat of design. Play, learn, challenge yourself.</p>
    </div>

    <div class="flex flex-wrap gap-3 mb-5">
      <div class="flex items-center gap-2 bg-slate-800 dark:bg-white border border-slate-700/50 dark:border-gray-200 rounded-xl px-4 py-2.5 text-sm shadow-sm">
        <i class="ri-gamepad-line text-cyan-400 dark:text-cyan-600"></i>
        <span id="total-count" class="font-bold text-white dark:text-gray-900">0</span>
        <span class="text-slate-400 dark:text-gray-500">Games Available</span>
      </div>
      <div class="flex items-center gap-2 bg-slate-800 dark:bg-white border border-slate-700/50 dark:border-gray-200 rounded-xl px-4 py-2.5 text-sm shadow-sm">
        <i class="ri-add-circle-line text-emerald-400 dark:text-emerald-600"></i>
        <span class="text-slate-400 dark:text-gray-500">More Coming Soon</span>
      </div>
    </div>

    <div class="bg-slate-800 dark:bg-white rounded-xl border border-slate-700/50 dark:border-gray-200 p-3 sm:p-4 mb-5 shadow-sm">
      <div class="relative">
        <i class="ri-search-line absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 dark:text-gray-400 text-base pointer-events-none"></i>
        <input id="search-input" type="text" placeholder="Search games by name, genre, or tag…"
          class="search-input w-full pl-9 pr-9 py-2.5 rounded-lg bg-slate-700 dark:bg-gray-100 text-slate-100 dark:text-gray-900 placeholder-slate-400 dark:placeholder-gray-400 border border-slate-600 dark:border-gray-200 transition-colors text-sm"
          oninput="handleSearch()" />
        <button id="clear-btn" onclick="clearSearch()" class="absolute right-2.5 top-1/2 -translate-y-1/2 text-slate-400 dark:text-gray-400 hover:text-slate-200 dark:hover:text-gray-700 transition-colors hidden">
          <i class="ri-close-circle-fill text-base"></i>
        </button>
      </div>
      <div class="flex items-center justify-between mt-2 px-0.5">
        <span class="text-xs text-slate-500 dark:text-gray-400">Tip: try "classic" or "2 player" or "memory"</span>
        <span id="result-count" class="text-xs text-slate-500 dark:text-gray-400 font-medium"></span>
      </div>
    </div>

    <div id="games-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3"></div>

    <div id="no-results" class="flex-col items-center justify-center py-16 text-center">
      <i class="ri-search-eye-line text-4xl text-slate-600 dark:text-gray-300 mb-3"></i>
      <h3 class="text-lg font-bold text-slate-400 dark:text-gray-500 mb-2">No games found.</h3>
      <p class="text-slate-500 dark:text-gray-400 text-sm mb-3">Try a different search term.</p>
      <button onclick="clearSearch()" class="text-sm text-cyan-400 dark:text-cyan-600 hover:underline font-medium">Clear search</button>
    </div>

    <div class="mt-8 bg-slate-800 dark:bg-white text-slate-400 dark:text-gray-500 rounded-xl border border-slate-700/50 dark:border-gray-200 px-5 py-3 text-xs text-center shadow-sm">
      &copy; 2026 Arpit Agarwala. Engineered with <span class="text-red-400">&#10084;&#65039;</span>
    </div>
  </div>

  <script>
    const GAMES = [
      {
        href: 'tictactoe.html',
        title: 'Tic Tac Toe',
        description: 'The classic 3×3 grid strategy game. Battle a friend locally or challenge the unbeatable AI powered by the Minimax algorithm. Track scores across rounds.',
        icon: 'ri-layout-grid-line',
        gradient: 'from-cyan-500 to-blue-600',
        genre: 'Classic',
        tags: ['2 Player', 'vs AI', 'Minimax', 'Strategy'],
        difficulty: 2,
        featured: true,
        players: '1–2',
        cta: 'Play Now'
      },
      {
        href: 'memory.html',
        title: 'Memory Cards',
        description: 'Flip and match all emoji pairs before time flies! Three difficulty levels, combo streaks, best time tracking, and smooth 3D card animations.',
        icon: 'ri-stack-line',
        gradient: 'from-violet-500 to-purple-600',
        genre: 'Memory',
        tags: ['Solo', 'Brain', 'Combos', 'Timer'],
        difficulty: 1,
        featured: true,
        players: '1',
        cta: 'Play Now'
      }
    ];

    let activeSearch = '';

    function renderGames() {
      const grid     = document.getElementById('games-grid');
      const noRes    = document.getElementById('no-results');
      const countEl  = document.getElementById('result-count');
      const totalEl  = document.getElementById('total-count');
      const q        = activeSearch.toLowerCase().trim();

      const filtered = GAMES.filter(g =>
        !q || g.title.toLowerCase().includes(q)
           || g.description.toLowerCase().includes(q)
           || g.tags.some(t => t.toLowerCase().includes(q))
           || g.genre.toLowerCase().includes(q)
      );

      totalEl.textContent  = GAMES.length;
      countEl.textContent  = filtered.length === GAMES.length
        ? `${GAMES.length} game${GAMES.length !== 1 ? 's' : ''}`
        : `${filtered.length} of ${GAMES.length}`;

      if (filtered.length === 0) { grid.innerHTML = ''; noRes.classList.add('visible'); return; }
      noRes.classList.remove('visible');

      grid.innerHTML = filtered.map((g, i) => `
        <div class="game-card" style="animation-delay:${i * 55}ms">
          <a href="${g.href}" class="card-link h-full bg-slate-800 dark:bg-white rounded-xl border border-slate-700/50 dark:border-gray-200 hover:border-cyan-400 dark:hover:border-cyan-400 shadow-sm hover:shadow-xl flex flex-col overflow-hidden block">
            <div class="h-1 w-full bg-gradient-to-r ${g.gradient} flex-shrink-0"></div>
            <div class="p-4 sm:p-5 flex flex-col flex-1">
              <div class="flex items-start justify-between mb-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br ${g.gradient} flex items-center justify-center shadow-md">
                  <i class="${g.icon} text-xl text-white"></i>
                </div>
                ${g.featured ? `<span class="text-xs font-bold px-2 py-0.5 rounded-full border border-cyan-500/30 dark:border-cyan-400/40 bg-cyan-900/20 dark:bg-cyan-50 flex items-center gap-1"><span class="featured-text">\u2B50 Featured</span></span>` : ''}
              </div>
              <h2 class="text-sm font-bold text-slate-100 dark:text-gray-900 mb-0.5">${g.title}</h2>
              <span class="text-xs text-slate-400 dark:text-gray-400 mb-2 flex items-center gap-3">
                <span class="flex items-center gap-1"><i class="ri-gamepad-line"></i> ${g.genre}</span>
                <span class="flex items-center gap-1"><i class="ri-user-line"></i> ${g.players} Player${g.players !== '1' ? 's' : ''}</span>
              </span>
              <p class="text-xs text-slate-400 dark:text-gray-500 leading-relaxed mb-3 flex-1">${g.description}</p>
              <div class="flex flex-wrap gap-1 mb-3">
                ${g.tags.map(t => `<span class="text-xs bg-slate-700 dark:bg-gray-100 text-slate-300 dark:text-gray-600 px-2 py-0.5 rounded-full">${t}</span>`).join('')}
              </div>
              <div class="flex items-center justify-between pt-2.5 border-t border-slate-700/50 dark:border-gray-100">
                <div class="flex items-center gap-1">
                  <span class="text-xs text-slate-500 dark:text-gray-400 mr-1">Difficulty</span>
                  ${[1,2,3].map(d => `<span class="w-1.5 h-1.5 rounded-full ${d <= g.difficulty ? 'dot-on' : 'dot-off'}"></span>`).join('')}
                </div>
                <span class="text-xs font-semibold text-cyan-400 dark:text-cyan-600 flex items-center gap-1">${g.cta} <i class="ri-arrow-right-line"></i></span>
              </div>
            </div>
          </a>
        </div>
      `).join('');
    }

    function handleSearch() {
      activeSearch = document.getElementById('search-input').value;
      document.getElementById('clear-btn').classList.toggle('hidden', !activeSearch);
      renderGames();
    }
    function clearSearch() {
      document.getElementById('search-input').value = '';
      activeSearch = '';
      document.getElementById('clear-btn').classList.add('hidden');
      renderGames();
    }

    (function () {
      document.getElementById('theme-icon').className =
        document.documentElement.classList.contains('dark') ? 'ri-sun-line text-lg' : 'ri-moon-line text-lg';
    })();

    function toggleTheme() {
      const html = document.documentElement, icon = document.getElementById('theme-icon');
      html.classList.toggle('dark');
      localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
      icon.className = html.classList.contains('dark') ? 'ri-sun-line text-lg' : 'ri-moon-line text-lg';
    }

    renderGames();
  </script>
</body>
</html>
