  <!--
    THEME INIT (runs before render to avoid flash)
    Convention: .dark on <html> = dark theme visually.
    localStorage 'theme' = 'dark' | 'light'.
    ?theme= URL param overrides on first load (cross-page sync).
  -->
  <script>
    (function () {
      var param = new URLSearchParams(window.location.search).get('theme');
      var stored = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

      var theme;
      if (param === 'dark' || param === 'light') {
        theme = param;
        localStorage.setItem('theme', theme);
      } else if (stored === 'dark' || stored === 'light') {
        theme = stored;
      } else {
        theme = prefersDark ? 'dark' : 'light';
      }

      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    })();
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<!--
  TAILWIND DARK: CLASSES ARE NOW CORRECT:
  No dark: prefix = light theme styles
  dark:           = dark theme styles
-->
<body class="min-h-screen bg-gray-50 dark:bg-[#080c14] text-gray-900 dark:text-slate-100 transition-colors duration-300">

  <!-- Back Button -->
  <div class="fixed top-3 left-3 z-50">
    <a id="back-link" href="index.html" class="w-9 h-9 flex items-center justify-center rounded-full bg-white dark:bg-slate-800/80 backdrop-blur border border-gray-200 dark:border-slate-700 text-gray-600 dark:text-slate-300 hover:border-cyan-500 dark:hover:border-cyan-400 hover:text-cyan-500 dark:hover:text-cyan-400 transition-all duration-150 shadow-lg">

  <!-- Theme Toggle -->
  <div class="fixed top-3 right-3 z-50">
    <button onclick="toggleTheme()" class="w-9 h-9 flex items-center justify-center rounded-full bg-white dark:bg-slate-800/80 backdrop-blur border border-gray-200 dark:border-slate-700 text-gray-600 dark:text-slate-300 hover:border-cyan-500 dark:hover:border-cyan-400 hover:text-cyan-500 dark:hover:text-cyan-400 transition-all duration-150 shadow-lg">

  <!-- Lightbox Modal -->
  <div id="lightbox" onclick="closeLightbox(event)">
    <button id="lightbox-close" onclick="closeLightbox()" aria-label="Close"><i class="ri-close-line"></i></button>
    <img id="lightbox-img" src="" alt="" />
    <div id="lightbox-meta">

      <div id="lightbox-sub"></div>

    <div id="lightbox-nav">
      <button class="lb-nav-btn" onclick="lbNav(-1)" aria-label="Previous"><i class="ri-arrow-left-s-line"></i></button>
      <span id="lightbox-caption"></span>
      <button class="lb-nav-btn" onclick="lbNav(1)" aria-label="Next"><i class="ri-arrow-right-s-line"></i></button>
    </div>
  </div>

  <div class="max-w-5xl mx-auto px-4 pt-16 pb-12">

    <!-- Header -->
    <div class="mb-7 fade-up">
      <div class="flex items-center gap-3 mb-1">
        <h1 class="text-3xl sm:text-4xl font-extrabold tracking-tight text-gray-900 dark:text-white">📸 Gallery</h1>
      </div>
      <p class="text-gray-500 dark:text-slate-400 text-sm max-w-lg">Moments, milestones &amp; memories — a visual story of who I am beyond the code.</p>
    </div>

    <!-- Stats Bar -->
    <div class="flex gap-4 mb-6 fade-up" style="animation-delay:60ms">
      <div class="flex items-center gap-2 bg-white dark:bg-slate-800/60 border border-gray-200 dark:border-slate-700/50 rounded-xl px-4 py-2.5">
        <i class="ri-image-line text-cyan-600 dark:text-cyan-400 text-base"></i>
        <span class="text-xs font-semibold text-gray-600 dark:text-slate-300"><span id="photo-count">0</span> Photos</span>
      </div>
      <div class="flex items-center gap-2 bg-white dark:bg-slate-800/60 border border-gray-200 dark:border-slate-700/50 rounded-xl px-4 py-2.5">
        <i class="ri-layout-masonry-line text-violet-600 dark:text-violet-400 text-base"></i>
        <span class="text-xs font-semibold text-gray-600 dark:text-slate-300" id="cat-count">0 Categories</span>
      </div>
    </div>

    <!-- Filter Bar -->
    <div id="filter-bar" class="flex flex-wrap gap-2 mb-7 fade-up" style="animation-delay:100ms"></div>

    <!-- Gallery Grid -->
    <div id="gallery-grid" class="masonry"></div>

    <!-- Empty State -->
    <div id="empty-state" class="hidden flex-col items-center justify-center py-24 text-center">
      <i class="ri-image-2-line text-5xl text-gray-300 dark:text-slate-700 mb-4"></i>
      <p class="text-gray-500 dark:text-slate-400 text-sm font-medium">No photos in this category yet.</p>
      <button onclick="setFilter('all')" class="mt-3 text-xs text-cyan-600 dark:text-cyan-400 hover:underline font-semibold">Show all</button>
    </div>

    <!-- Upload Banner -->
    <div id="upload-banner" class="mt-8 rounded-2xl border border-dashed border-gray-300 dark:border-slate-700/70 bg-white/60 dark:bg-slate-800/30 p-6 text-center fade-up" style="animation-delay:200ms">
      <i class="ri-cloud-upload-line text-3xl text-gray-400 dark:text-slate-600 mb-2"></i>
      <p class="text-sm text-gray-500 dark:text-slate-400 font-medium">Add your photos to <code class="text-cyan-600 dark:text-cyan-400 bg-gray-100 dark:bg-slate-800 px-1.5 py-0.5 rounded text-xs">assets/images/gallery/</code> and update the <code class="text-cyan-600 dark:text-cyan-400 bg-gray-100 dark:bg-slate-800 px-1.5 py-0.5 rounded text-xs">PHOTOS</code> array in this file.</p>
    </div>

    <!-- Footer -->
    <div class="mt-10 text-center text-xs text-gray-400 dark:text-slate-600">
      &copy; 2026 Arpit Agarwala. Engineered with <span class="text-red-400">&#10084;&#65039;</span>
    </div>

  </div>

  <script>
    const PHOTOS = [
      {
        src:   'https://res.cloudinary.com/dxsja3wy5/image/upload/v1772894901/WhatsApp_Image_2026-03-07_at_8.03.13_PM_kvvxso.jpg',
        thumb: 'https://res.cloudinary.com/dxsja3wy5/image/upload/w_600,q_auto,f_auto/v1772894901/WhatsApp_Image_2026-03-07_at_8.03.13_PM_kvvxso.jpg',
        title: 'Moment 01',

      },
      {

        thumb: 'https://res.cloudinary.com/dxsja3wy5/image/upload/w_600,q_auto,f_auto/v1772894900/WhatsApp_Image_2026-03-07_at_8.01.51_PM_oq4kkf.jpg',
        title: 'Moment 02',

      },
      {
        src:   'https://res.cloudinary.com/dxsja3wy5/image/upload/v1772894899/WhatsApp_Image_2026-03-07_at_8.02.54_PM_1_clkjsu.jpg',
        thumb: 'https://res.cloudinary.com/dxsja3wy5/image/upload/w_600,q_auto,f_auto/v1772894899/WhatsApp_Image_2026-03-07_at_8.02.54_PM_1_clkjsu.jpg',
        title: 'Moment 03',
        category: 'Moments'
      },
      {
        src:   'https://res.cloudinary.com/dxsja3wy5/image/upload/v1772894899/WhatsApp_Image_2026-03-07_at_8.02.54_PM_pa7ebr.jpg',
        thumb: 'https://res.cloudinary.com/dxsja3wy5/image/upload/w_600,q_auto,f_auto/v1772894899/WhatsApp_Image_2026-03-07_at_8.02.54_PM_pa7ebr.jpg',
        title: 'Moment 04',
        category: 'Moments'
      },
      {
        src:   'https://res.cloudinary.com/dxsja3wy5/image/upload/v1772894896/WhatsApp_Image_2026-03-07_at_7.54.14_PM_d5wdun.jpg',
        thumb: 'https://res.cloudinary.com/dxsja3wy5/image/upload/w_600,q_auto,f_auto/v1772894896/WhatsApp_Image_2026-03-07_at_7.54.14_PM_d5wdun.jpg',
        title: 'Moment 05',
        category: 'Moments'
      },
      {
        src:   'https://res.cloudinary.com/dxsja3wy5/image/upload/v1772894898/WhatsApp_Image_2026-03-07_at_8.02.35_PM_ncn6ib.jpg',
        thumb: 'https://res.cloudinary.com/dxsja3wy5/image/upload/w_600,q_auto,f_auto/v1772894898/WhatsApp_Image_2026-03-07_at_8.02.35_PM_ncn6ib.jpg',
        title: 'Moment 06',

      },
      {
        src:   'https://res.cloudinary.com/dxsja3wy5/image/upload/v1772894898/WhatsApp_Image_2026-03-07_at_8.01.35_PM_cehcpv.jpg',
        thumb: 'https://res.cloudinary.com/dxsja3wy5/image/upload/w_600,q_auto,f_auto/v1772894898/WhatsApp_Image_2026-03-07_at_8.01.35_PM_cehcpv.jpg',
        title: 'Moment 07',
        category: 'Moments'
      },
      {
        src:   'https://res.cloudinary.com/dxsja3wy5/image/upload/v1772894897/WhatsApp_Image_2026-03-07_at_7.53.41_PM_f49pkm.jpg',
        thumb: 'https://res.cloudinary.com/dxsja3wy5/image/upload/w_600,q_auto,f_auto/v1772894897/WhatsApp_Image_2026-03-07_at_7.53.41_PM_f49pkm.jpg',
        title: 'Moment 08',
        category: 'Moments'
      },
      {
        src:   'https://res.cloudinary.com/dxsja3wy5/image/upload/v1772894896/WhatsApp_Image_2026-03-07_at_7.56.25_PM_qnavfl.jpg',
        thumb: 'https://res.cloudinary.com/dxsja3wy5/image/upload/w_600,q_auto,f_auto/v1772894896/WhatsApp_Image_2026-03-07_at_7.56.25_PM_qnavfl.jpg',
        title: 'Moment 09',
        category: 'Moments'
      },
      {
        src:   'https://res.cloudinary.com/dxsja3wy5/image/upload/v1772894896/WhatsApp_Image_2026-03-07_at_7.54.50_PM_xqrzjf.jpg',
        thumb: 'https://res.cloudinary.com/dxsja3wy5/image/upload/w_600,q_auto,f_auto/v1772894896/WhatsApp_Image_2026-03-07_at_7.54.50_PM_xqrzjf.jpg',
        title: 'Moment 10',
        category: 'Moments'
      }
    ];

    let activeFilter = 'all';
    let currentIdx   = 0;

    const categories = ['all', ...new Set(PHOTOS.map(p => p.category))];
    document.getElementById('photo-count').textContent = PHOTOS.length;
    document.getElementById('cat-count').textContent = (categories.length - 1) + ' Categories';

    const filterBar = document.getElementById('filter-bar');
    categories.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (cat === 'all' ? ' active' : '');
      btn.textContent = cat === 'all' ? 'All' : cat;
      btn.onclick = () => setFilter(cat);
      filterBar.appendChild(btn);
    });

    function setFilter(cat) {
      activeFilter = cat;
      document.querySelectorAll('.filter-btn').forEach((b, i) => {
        b.classList.toggle('active', categories[i] === cat);
      });
      renderGallery();
    }

    function renderGallery() {
      const grid  = document.getElementById('gallery-grid');
      const empty = document.getElementById('empty-state');
      const filtered = activeFilter === 'all' ? PHOTOS : PHOTOS.filter(p => p.category === activeFilter);

      if (!filtered.length) {
        grid.innerHTML = '';
        empty.classList.remove('hidden');
        empty.classList.add('flex');
        return;
      }
      empty.classList.add('hidden');

      grid.innerHTML = filtered.map((p, i) => `
        <div class="masonry-item">
          <div class="photo-card" onclick="openLightbox(${PHOTOS.indexOf(p)})">
            <img src="${p.thumb}" alt="${p.title}" loading="lazy">
            <div class="overlay">
              <span class="tag-pill"><i class="ri-image-line"></i>${p.category}</span>
            </div>
          </div>
        </div>
      `).join('');
    }

    function openLightbox(idx) {
      currentIdx = idx;
      updateLightbox();
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox(event) {
      if (event && event.target.id !== 'lightbox' && event.target.id !== 'lightbox-close' && !event.target.closest('#lightbox-close')) return;
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    function lbNav(dir) {
      currentIdx = (currentIdx + dir + PHOTOS.length) % PHOTOS.length;
      updateLightbox();
    }

    function updateLightbox() {
      const p = PHOTOS[currentIdx];
      document.getElementById('lightbox-img').src = p.src;
      document.getElementById('lightbox-title').textContent = p.title;
      document.getElementById('lightbox-sub').textContent = p.category;
      document.getElementById('lightbox-caption').textContent = `${currentIdx + 1} / ${PHOTOS.length}`;
    }

    /* ── Theme helpers ── */
    function isDark() {
      return document.documentElement.classList.contains('dark');
    }

    function syncIcon() {
      document.getElementById('theme-icon').className = isDark() ? 'ri-sun-line text-base' : 'ri-moon-line text-base';
    }

    function updateBackLink() {
      var backLink = document.getElementById('back-link');
      if (backLink) {
        backLink.href = 'index.html?theme=' + (isDark() ? 'dark' : 'light');
      }
    }

    function toggleTheme() {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', isDark() ? 'dark' : 'light');
      syncIcon();
      updateBackLink();
    }

    syncIcon();
    updateBackLink();
    renderGallery();

    document.addEventListener('keydown', e => {
      if (!document.getElementById('lightbox').classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      else if (e.key === 'ArrowLeft') lbNav(-1);
      else if (e.key === 'ArrowRight') lbNav(1);
    });
  </script>

</body>
</html>
