  <script>
    const ARTICLES = [
      {
        id: 1,
        title: 'How AI is Revolutionizing Algorithmic Trading in 2026',
        date: 'February 2026',
        category: 'AI & Trading',
        categoryColor: 'blue',
        icon: 'ri-robot-line',
        iconGradient: 'from-blue-500 to-blue-600',
        readTime: 8,
        summary: 'Machine learning models are now processing millions of market data points in real-time, identifying patterns that human traders miss. From sentiment analysis of news feeds to predictive models for price movements, AI is reshaping how retail and institutional investors approach the markets.',
        tags: ['Machine Learning', 'Algorithmic Trading', 'Market Analysis'],
        content: `
          <p class="leading-relaxed mb-4 text-slate-300 dark:text-gray-600">The landscape of algorithmic trading has undergone a seismic shift with the advent of advanced artificial intelligence and machine learning technologies. In 2026, AI-powered trading systems are no longer just tools for institutional investors—they’re reshaping how retail traders approach markets.</p>
          <h3 class="text-slate-100 dark:text-gray-900">The Evolution of Trading Algorithms</h3>
          <p>Traditional trading algorithms relied on predetermined rules and technical indicators. Today’s AI systems learn from millions of data points, adapting their strategies in real-time. Machine learning models can process news sentiment, social media trends, earnings reports, and market microstructure data simultaneously, identifying patterns invisible to human analysis.</p>
          <h3 class="text-slate-100 dark:text-gray-900">Sentiment Analysis at Scale</h3>
          <p>Modern AI trading systems analyze thousands of news articles, social media posts, and analyst reports every second. Natural Language Processing (NLP) models can detect subtle sentiment shifts that precede major market movements. For Indian markets, these systems now process regional language content, capturing sentiment from vernacular news sources and social platforms.</p>
          <h3 class="text-slate-100 dark:text-gray-900">Predictive Models and Pattern Recognition</h3>
          <p>Deep learning models have become remarkably proficient at identifying complex market patterns. These neural networks can detect order book imbalances, predict short-term price movements, and identify optimal entry and exit points with unprecedented accuracy. Retail platforms like Dhan, Zerodha, and Groww are beginning to integrate these AI capabilities into their trading interfaces.</p>
          <h3 class="text-slate-100 dark:text-gray-900">Risk Management and Position Sizing</h3>
          <p>AI doesn’t just identify trading opportunities—it also optimizes risk management. Modern systems calculate optimal position sizes based on volatility forecasts, portfolio correlation, and individual risk tolerance. They can automatically adjust stop-losses and take-profits based on changing market conditions.</p>
          <h3 class="text-slate-100 dark:text-gray-900">The Democratization of AI Trading</h3>
          <p>What was once available only to hedge funds and institutional traders is now accessible to retail investors. Platforms are offering AI-powered trading signals, automated strategy builders, and backtesting tools. However, this democratization also means markets are becoming more efficient, making it harder to find alpha.</p>
          <h3 class="text-slate-100 dark:text-gray-900">Challenges and Ethical Considerations</h3>
          <p>AI trading isn’t without challenges. Model overfitting, black-box decision-making, and the potential for coordinated algorithmic behavior pose risks. Regulators like SEBI are working to establish guidelines for AI trading systems, focusing on transparency and market stability.</p>
          <h3 class="text-slate-100 dark:text-gray-900">The Future: Human-AI Collaboration</h3>
          <p>The most successful traders in 2026 aren’t purely algorithmic—they combine AI insights with human judgment. AI handles data processing and pattern recognition, while humans provide strategic oversight, adapt to unprecedented events, and make decisions during market anomalies.</p>
        `
      },
      {
        id: 2,
        title: 'The Convergence of DeFi and Traditional Finance',
        date: 'January 2026',
        category: 'DeFi',
        categoryColor: 'purple',
        icon: 'ri-coin-line',
        iconGradient: 'from-purple-500 to-purple-600',
        readTime: 12,
        summary: 'Decentralized Finance (DeFi) protocols are no longer fringe experiments—they\'re becoming integrated into mainstream financial services. Major banks are exploring blockchain-based settlement systems, while DeFi platforms are adding regulatory compliance features.',
        tags: ['Blockchain', 'Smart Contracts', 'Banking'],
        content: `
          <p class="leading-relaxed mb-4 text-slate-300 dark:text-gray-600">Decentralized Finance (DeFi) is no longer an experimental fringe of the financial world. In 2026, the lines between traditional banking and decentralized systems are blurring, creating a hybrid financial ecosystem.</p>
          <h3 class="text-slate-100 dark:text-gray-900">From Experimental to Mainstream</h3>
          <p>Major banks like HDFC, ICICI, and Axis are piloting blockchain-based settlement systems. Cross-border payments that once took days now settle in minutes through blockchain rails, reducing costs by up to 80%.</p>
          <h3 class="text-slate-100 dark:text-gray-900">Smart Contracts in Banking</h3>
          <p>Smart contracts are automating lending, insurance claims, and trade finance. A home loan approval that traditionally required weeks of paperwork now executes automatically when predefined conditions are met.</p>
          <h3 class="text-slate-100 dark:text-gray-900">Tokenization of Assets</h3>
          <p>Real estate, bonds, and even company shares are being tokenized on blockchain networks. This tokenization enables fractional ownership, 24/7 trading, and instant settlement.</p>
          <h3 class="text-slate-100 dark:text-gray-900">Regulatory Compliance in DeFi</h3>
          <p>New DeFi protocols now integrate KYC/AML checks, transaction monitoring, and regulatory reporting. SEBI and RBI are working on frameworks that allow innovation while protecting consumers.</p>
          <h3 class="text-slate-100 dark:text-gray-900">The Future: A Hybrid Financial System</h3>
          <p>The future isn’t purely decentralized or centralized—it’s hybrid. Traditional banks provide security and compliance. DeFi provides efficiency and innovation. The convergence creates infrastructure that’s more accessible and resilient than either alone.</p>
        `
      },
      {
        id: 3,
        title: 'The Mathematics of Wealth: Understanding SIP Returns',
        date: 'December 2025',
        category: 'Investing',
        categoryColor: 'green',
        icon: 'ri-line-chart-line',
        iconGradient: 'from-green-500 to-green-600',
        readTime: 10,
        summary: 'Systematic Investment Plans (SIPs) harness the power of compounding and rupee-cost averaging to build wealth over time. This article breaks down the mathematical principles behind SIP investing and provides practical strategies for optimizing your portfolio.',
        tags: ['SIP', 'Mutual Funds', 'Wealth Building'],
        content: `
          <p class="leading-relaxed mb-4 text-slate-300 dark:text-gray-600">Systematic Investment Plans (SIPs) are often called the retail investor’s secret weapon. But what makes them so powerful? The answer lies in mathematics—specifically, the principles of compounding and rupee-cost averaging.</p>
          <h3 class="text-slate-100 dark:text-gray-900">The Power of Compounding</h3>
          <p>A monthly SIP of ₹5,000 at 12% annual returns becomes ₹11.7 lakhs after 10 years—₹6 lakhs from your contributions and ₹5.7 lakhs from compounding alone.</p>
          <h3 class="text-slate-100 dark:text-gray-900">Rupee-Cost Averaging Explained</h3>
          <p>When markets fall, your fixed monthly investment buys more units. When markets rise, you buy fewer units at higher values. Over time, this averages out your purchase cost.</p>
          <h3 class="text-slate-100 dark:text-gray-900">The Time Factor</h3>
          <p>Starting a ₹5,000 monthly SIP at age 25 versus 35 gives an extra 10 years of compounding. At 12% returns, that translates to an additional ₹1.2 crores by retirement at 60.</p>
          <h3 class="text-slate-100 dark:text-gray-900">SIP Step-Ups: Turbocharging Growth</h3>
          <p>Increasing your SIP by 10% annually (step-up SIP) at 12% returns builds ₹60 lakhs over 15 years, compared to ₹25 lakhs without step-ups.</p>
          <h3 class="text-slate-100 dark:text-gray-900">Optimizing Your SIP Strategy</h3>
          <p>Start early, stay consistent, and increase contributions with income. Diversify across large-cap, mid-cap, and index funds. Most importantly, stay invested during downturns—that’s when SIPs work their magic.</p>
        `
      },
      {
        id: 4,
        title: 'Generative AI: The New Frontier in Financial Services',
        date: 'November 2025',
        category: 'AI',
        categoryColor: 'orange',
        icon: 'ri-cpu-line',
        iconGradient: 'from-orange-500 to-orange-600',
        readTime: 11,
        summary: 'ChatGPT and similar large language models are transforming customer service, financial analysis, and automated reporting in the fintech industry. Explore how generative AI is being integrated into financial platforms.',
        tags: ['Generative AI', 'Automation', 'Customer Service'],
        content: `
          <p class="leading-relaxed mb-4 text-slate-300 dark:text-gray-600">Generative AI, powered by large language models like ChatGPT, Claude, and Gemini, is fundamentally transforming financial services in 2025–26.</p>
          <h3 class="text-slate-100 dark:text-gray-900">AI-Powered Customer Service</h3>
          <p>Banks are deploying AI chatbots that understand context, remember conversation history, and provide personalized responses. HDFC Bank’s EVA and ICICI’s iPal can now resolve 80% of customer queries without human intervention.</p>
          <h3 class="text-slate-100 dark:text-gray-900">Automated Financial Analysis</h3>
          <p>Generative AI can analyze financial statements, market reports, and economic data in seconds, generating comprehensive investment analysis and identifying portfolio risks. What took analysts days now takes minutes.</p>
          <h3 class="text-slate-100 dark:text-gray-900">Challenges: Accuracy and Hallucinations</h3>
          <p>The biggest risk is “hallucinations”—confidently stated incorrect information. In finance, where accuracy is critical, financial institutions implement multiple verification layers and human oversight.</p>
          <h3 class="text-slate-100 dark:text-gray-900">The Future of Financial Advisors</h3>
          <p>AI won’t replace financial advisors—it will augment them. Advisors equipped with AI tools can serve more clients, provide deeper analysis, and focus on relationship building.</p>
        `
      },
      {
        id: 5,
        title: "The Rise of the Retail Investor: India's Market Revolution",
        date: 'October 2025',
        category: 'Market Trends',
        categoryColor: 'red',
        icon: 'ri-team-line',
        iconGradient: 'from-red-500 to-red-600',
        readTime: 9,
        summary: 'Over 10 crore Indians now actively trade in the stock market, a dramatic shift from just a decade ago. Mobile trading apps, zero-commission brokerages, and financial literacy content have democratized access to markets.',
        tags: ['Retail Trading', 'Indian Markets', 'Democratization'],
        content: `
          <p class="leading-relaxed mb-4 text-slate-300 dark:text-gray-600">India’s financial markets are experiencing a seismic demographic shift. Over 10 crore (100 million) Indians now actively participate in stock markets—a number that was barely 2 crore just a decade ago.</p>
          <h3 class="text-slate-100 dark:text-gray-900">The Technology Catalysts</h3>
          <p>Mobile trading apps from Zerodha, Groww, Upstox, and Angel One made market access as simple as ordering food. UPI integration enabled instant fund transfers, and video KYC eliminated friction from account opening.</p>
          <h3 class="text-slate-100 dark:text-gray-900">Zero-Commission Disruption</h3>
          <p>Traditional brokers charged 0.5–1% per trade. Discount brokers brought it to flat ₹20. Now, equity delivery trades are free on most platforms—making a ₹1,000 investment viable for the first time.</p>
          <h3 class="text-slate-100 dark:text-gray-900">Financial Literacy Explosion</h3>
          <p>YouTube channels, Instagram finfluencers, and podcasts democratized financial education in regional languages, driving participation beyond metro areas into tier-2 and tier-3 cities.</p>
          <h3 class="text-slate-100 dark:text-gray-900">Changing Market Dynamics</h3>
          <p>Retail investors now account for over 40% of daily trading volumes. Their collective behavior influences price discovery and volatility. The days of institutions dominating price action are over.</p>
          <h3 class="text-slate-100 dark:text-gray-900">The Path Forward</h3>
          <p>India’s retail investor base will likely double again in the next decade. This democratization of capital markets represents one of the most significant economic shifts in modern Indian history.</p>
        `
      }
    ];

    const CATEGORY_BADGE = {
      'AI & Trading':  'bg-blue-900/40 text-blue-300 dark:bg-blue-100 dark:text-blue-700',
      'DeFi':          'bg-purple-900/40 text-purple-300 dark:bg-purple-100 dark:text-purple-700',
      'Investing':     'bg-green-900/40 text-green-300 dark:bg-green-100 dark:text-green-700',
      'AI':            'bg-orange-900/40 text-orange-300 dark:bg-orange-100 dark:text-orange-700',
      'Market Trends': 'bg-red-900/40 text-red-300 dark:bg-red-100 dark:text-red-700',
    };

    let activeCategory = 'all';
    let activeSearch   = '';

    function renderArticles() {
      const container = document.getElementById('articles-container');
      const noResults = document.getElementById('no-results');
      const countEl   = document.getElementById('result-count');
      const query     = activeSearch.toLowerCase().trim();

      const filtered = ARTICLES.filter(a => {
        const matchCat = activeCategory === 'all' || a.category === activeCategory;
        const matchQ   = !query
          || a.title.toLowerCase().includes(query)
          || a.summary.toLowerCase().includes(query)
          || a.tags.some(t => t.toLowerCase().includes(query))
          || a.category.toLowerCase().includes(query)
          || a.date.toLowerCase().includes(query);
        return matchCat && matchQ;
      });

      const total = ARTICLES.length;
      countEl.textContent = filtered.length === total
        ? `${total} articles`
        : `${filtered.length} of ${total} articles`;

      if (filtered.length === 0) {
        container.innerHTML = '';
        noResults.classList.add('visible');
        return;
      }
      noResults.classList.remove('visible');

      container.innerHTML = filtered.map(a => `
        <article
          onclick="openModal(${a.id})"
          class="article-card bg-slate-800 dark:bg-white rounded-xl p-4 sm:p-5 shadow-sm border border-slate-700/50 dark:border-gray-200 hover:border-cyan-400 dark:hover:border-cyan-400 hover:shadow-lg cursor-pointer"
          role="button" tabindex="0"
          onkeydown="if(event.key==='Enter'||event.key===' ')openModal(${a.id})"
          aria-label="Read article: ${a.title}"
        >
          <div class="flex items-start gap-4">
            <div class="flex-shrink-0 w-12 h-12 bg-gradient-to-br ${a.iconGradient} rounded-xl flex items-center justify-center shadow-md">
              <i class="${a.icon} text-xl text-white"></i>
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex flex-wrap items-center gap-2 text-xs text-slate-400 dark:text-gray-500 mb-1.5">
                <span class="flex items-center gap-1"><i class="ri-calendar-line"></i>${a.date}</span>
                <span class="text-slate-600 dark:text-gray-300">•</span>
                <span class="${CATEGORY_BADGE[a.category] || ''} px-2 py-0.5 rounded-full font-medium">${a.category}</span>
                <span class="text-slate-600 dark:text-gray-300">•</span>
                <span class="flex items-center gap-1"><i class="ri-time-line"></i>${a.readTime} min read</span>
              </div>
              <h2 class="text-base sm:text-lg font-bold text-slate-100 dark:text-gray-900 mb-1.5 leading-snug">${a.title}</h2>
              <p class="text-xs text-slate-400 dark:text-gray-500 leading-relaxed mb-2.5 line-clamp-2">${a.summary}</p>
              <div class="flex flex-wrap items-center justify-between gap-2">
                <div class="flex flex-wrap gap-1">
                  ${a.tags.map(t => `<span class="article-tag text-xs bg-slate-700 dark:bg-gray-100 hover:bg-slate-600 dark:hover:bg-gray-200 text-slate-300 dark:text-gray-600 px-2 py-0.5 rounded-full">${t}</span>`).join('')}
                </div>
                <span class="text-xs text-cyan-400 dark:text-cyan-600 font-medium flex items-center gap-1 flex-shrink-0">Read more <i class="ri-arrow-right-line"></i></span>
              </div>
            </div>
          </div>
        </article>
      `).join('');
    }

    function filterArticles() {
      const input = document.getElementById('search-input');
      activeSearch = input.value;
      document.getElementById('clear-search').classList.toggle('hidden', !activeSearch);
      renderArticles();
    }

    function clearSearch() {
      document.getElementById('search-input').value = '';
      activeSearch = '';
      document.getElementById('clear-search').classList.add('hidden');
      renderArticles();
    }

    function setFilter(btn, category) {
      activeCategory = category;
      document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      renderArticles();
    }

    function openModal(id) {
      const article = ARTICLES.find(a => a.id === id);
      if (!article) return;
      document.getElementById('modal-title').textContent = article.title;
      document.getElementById('modal-meta').innerHTML = `
        <span class="flex items-center gap-1"><i class="ri-calendar-line"></i>${article.date}</span>
        <span>•</span>
        <span class="${CATEGORY_BADGE[article.category] || ''} px-2 py-0.5 rounded-full font-medium">${article.category}</span>
        <span>•</span>
        <span class="flex items-center gap-1"><i class="ri-time-line"></i>${article.readTime} min read</span>
      `;
      document.getElementById('modal-body').innerHTML = article.content;
      const backdrop = document.getElementById('modal-backdrop');
      backdrop.classList.remove('hidden');
      backdrop.classList.add('flex');
      document.body.style.overflow = 'hidden';
      const box = document.getElementById('modal-box');
      box.style.animation = 'none'; box.offsetHeight; box.style.animation = '';
    }

    function closeModal() {
      const backdrop = document.getElementById('modal-backdrop');
      backdrop.classList.add('hidden');
      backdrop.classList.remove('flex');
      document.body.style.overflow = '';
    }

    function handleBackdropClick(e) {
      if (e.target === document.getElementById('modal-backdrop')) closeModal();
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    function toggleTheme() {
      const html = document.documentElement;
      html.classList.toggle('dark');
      localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
      document.getElementById('theme-icon').className = html.classList.contains('dark') ? 'ri-sun-line text-lg' : 'ri-moon-line text-lg';
    }

    (function () {
      document.getElementById('theme-icon').className =
        document.documentElement.classList.contains('dark') ? 'ri-sun-line text-lg' : 'ri-moon-line text-lg';
    })();

    renderArticles();
  </script>

</body>
</html>
