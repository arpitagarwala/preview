  <script>
    const ARTICLES = [
      {
        id: 2,
        title: 'The Mumbai Airport Takeover: How Adani Acquired India\'s Second-Busiest Airport Amid Controversy',
        date: 'March 2026',
        category: 'Business',
        categoryColor: 'amber',
        icon: 'ri-flight-takeoff-line',
        iconGradient: 'from-amber-500 to-orange-600',
        readTime: 18,
        summary: 'A Rs 13,000 crore debt crisis, investigative raids, jilted foreign investors, and a last-minute switch to Adani. How India\'s second-busiest airport changed hands in one of the most contentious infrastructure acquisitions in Indian history — and the questions that still linger.',
        tags: ['Adani', 'Mumbai Airport', 'MIAL', 'Infrastructure', 'Privatisation'],
        content: `
          <div class="callout callout-warning">
            <p class="text-xs font-semibold text-amber-400 dark:text-amber-600 mb-1 uppercase tracking-wide">&#9992; Key Facts at a Glance</p>
            <p class="mb-1"><strong>Asset:</strong> Chhatrapati Shivaji Maharaj International Airport, Mumbai (MIAL)</p>
            <p class="mb-1"><strong>Acquirer:</strong> Adani Airport Holdings Ltd (AAHL)</p>
            <p class="mb-1"><strong>Stake acquired:</strong> 74% &nbsp;·&nbsp; <strong>AAI retained:</strong> 26%</p>
            <p class="mb-0"><strong>Completed:</strong> February 2021 &nbsp;·&nbsp; <strong>GVK debt:</strong> ~&#8377;13,000 crore</p>
          </div>

          <p class="leading-relaxed mb-4 text-slate-300 dark:text-gray-600">In February 2021, the Adani Group completed one of the most contentious acquisitions in Indian infrastructure history — gaining control of Mumbai’s Chhatrapati Shivaji Maharaj International Airport. What should have been a routine corporate transaction became a political flashpoint, with allegations of arm-twisting, regulatory pressure, and questions about how a group with <em>&#8220;no airport experience&#8221;</em> ended up controlling India’s second-busiest airport.</p>
          <p class="text-slate-300 dark:text-gray-600">The story involves debt-ridden promoters, investigative agencies, jilted foreign investors, and a last-minute switch that left everyone asking: Was this a legitimate business rescue — or something more sinister?</p>

          <div class="section-divider"></div>

          <h3 class="text-slate-100 dark:text-gray-900">&#128200; When Things Started Going Wrong: The GVK Crisis</h3>
          <p>The GVK Group, led by the Reddy family, held a commanding <strong class="text-slate-100 dark:text-gray-900">50.5% stake</strong> in Mumbai International Airport Limited (MIAL). They had been operating the airport since winning the privatisation bid years earlier. Mumbai airport was expanding, modernising, and handling tens of millions of passengers annually.</p>
          <p>But beneath the surface, trouble was brewing. GVK was drowning in debt — over <strong class="text-slate-100 dark:text-gray-900">&#8377;13,000 crore</strong> — much of it from massive cost overruns during the airport’s development and expansion. By early 2020, GVK had already decided to sell. They’d found buyers: a prestigious consortium comprising <strong>Abu Dhabi Investment Authority (ADIA)</strong>, Canada’s <strong>PSP Investments</strong>, and India’s own <strong>National Investment and Infrastructure Fund (NIIF)</strong>. Documents were being drafted, and it seemed like GVK had found a lifeline. Then everything changed.</p>

          <div class="section-divider"></div>

          <h3 class="text-slate-100 dark:text-gray-900">&#128197; The Timeline: June – February</h3>

          <div class="timeline-item">
            <div class="timeline-dot"></div>
            <div><strong class="text-slate-200 dark:text-gray-800">June – July 2020:</strong> The CBI registers a case against GVK for alleged financial irregularities. The ED follows shortly after. The allegation: GVK had siphoned off <strong>&#8377;705 crore</strong> from MIAL — money belonging to the airport, allegedly diverted elsewhere in the group.</div>
          </div>
          <div class="timeline-item">
            <div class="timeline-dot"></div>
            <div><strong class="text-slate-200 dark:text-gray-800">August 2020:</strong> Barely two months after the raids, GVK makes a stunning announcement — they will now &#8220;cooperate&#8221; with the <strong>Adani Group</strong> instead of proceeding with the ADIA consortium. At this point, Adani’s airport portfolio consisted of six recently won bids (Ahmedabad, Lucknow, Mangaluru, Jaipur, Guwahati, Thiruvananthapuram) — none yet operational.</div>
          </div>
          <div class="timeline-item">
            <div class="timeline-dot"></div>
            <div><strong class="text-slate-200 dark:text-gray-800">Phase 1:</strong> Adani Airport Holdings Ltd (AAHL) acquires the <em>debt</em> of GVK Airport Developers Ltd — the entity holding the 50.5% stake in MIAL. By buying the debt, Adani effectively gained leverage over GVK’s decision-making.</div>
          </div>
          <div class="timeline-item">
            <div class="timeline-dot"></div>
            <div><strong class="text-slate-200 dark:text-gray-800">Phase 2:</strong> Adani buys out minority foreign partners — <strong>13.5%</strong> from South Africa’s Bidvest and <strong>10%</strong> from ACSA (Airports Company South Africa).</div>
          </div>
          <div class="timeline-item">
            <div class="timeline-dot" style="background:#f59e0b"></div>
            <div><strong class="text-slate-200 dark:text-gray-800">February 2021:</strong> Adani controls <strong>74% of MIAL</strong> (50.5% from GVK + 23.5% from minority partners). AAI retains 26%. Bonus: the deal includes control of the upcoming <strong>Navi Mumbai International Airport</strong>.</div>
          </div>

          <div class="section-divider"></div>

          <h3 class="text-slate-100 dark:text-gray-900">&#9876; The Allegations: Was This a Hijack?</h3>
          <p>Opposition leaders — particularly Congress MP Rahul Gandhi — didn’t mince words, using the term <em>&#8220;hijacking&#8221;</em> of a strategic national asset in Parliament. The allegations fell into four categories:</p>

          <h3 class="text-slate-100 dark:text-gray-900" style="margin-top:1rem">1 &nbsp;·&nbsp; Agency Pressure as Leverage</h3>
          <div class="callout callout-danger">
            <p class="text-xs font-semibold text-red-400 dark:text-red-600 mb-1 uppercase tracking-wide">&#9888; The Timing Argument</p>
            <p class="mb-0">Investigative agencies launch cases in <strong>June–July 2020</strong>. GVK abandons a carefully negotiated deal with reputable foreign investors and switches to Adani by <strong>August 2020</strong> — within two months. Critics argued this wasn’t a business decision; it was coercion.</p>
          </div>

          <h3 class="text-slate-100 dark:text-gray-900" style="margin-top:1rem">2 &nbsp;·&nbsp; Breach of Existing Agreements</h3>
          <p>The jilted ADIA–PSP–NIIF consortium wasn’t going quietly. They protested, claiming that GVK’s pivot violated their agreement — which included a <strong>Right of First Refusal</strong> clause. If GVK was selling to someone else, the consortium should have been given the first opportunity to match the offer. Instead, they were unceremoniously dropped.</p>

          <h3 class="text-slate-100 dark:text-gray-900" style="margin-top:1rem">3 &nbsp;·&nbsp; Convenient Rule Changes</h3>
          <p>Reports emerged that the government had changed privatisation rules for airports, <strong>removing requirements for prior airport operating experience</strong>. Previously, bidders needed to demonstrate experience in managing airports. The rule change meant that entities like Adani — with virtually no operational airport experience at the time — could suddenly bid for and win control of major airports. NITI Aayog had reportedly recommended <em>against</em> awarding six airports to an inexperienced operator. Those recommendations were apparently ignored.</p>

          <h3 class="text-slate-100 dark:text-gray-900" style="margin-top:1rem">4 &nbsp;·&nbsp; Undervalued Asset Sales</h3>
          <p><em>The Hindu</em> reported allegations that AAI assets worth <strong>&#8377;1,300 crore</strong> at three airports were sold to Adani for just <strong>&#8377;500 crore</strong> — a massive potential value destruction for the government-owned entity.</p>

          <div class="section-divider"></div>

          <h3 class="text-slate-100 dark:text-gray-900">&#128075; The Defense: GVK’s Official Position</h3>
          <p>Sanjay Reddy, representing the GVK Group, was unequivocal: <em>&#8220;There was no extraneous pressure to sell. No pressure from the Adani Group.&#8221;</em></p>
          <p>His argument was straightforward: GVK was buried in &#8377;13,000 crore of debt. They needed to sell to survive. The decision to go with Adani was a <em>&#8220;business imperative&#8221;</em> driven purely by debt management needs. When you owe that much and investigative agencies are circling, your negotiating position isn’t exactly strong — you take the best available deal, and you take it quickly. Whether the &#8220;best available deal&#8221; materialised because of market forces or other pressures is precisely where opinions diverge sharply.</p>

          <div class="section-divider"></div>

          <h3 class="text-slate-100 dark:text-gray-900">&#9992; What Actually Changed: Life After Adani</h3>

          <h3 class="text-slate-100 dark:text-gray-900" style="margin-top:1rem">Operational Strategy Shift</h3>
          <p>Adani didn’t just want to run the airport — they wanted to fundamentally change how it made money. The group shifted strategy toward maximising <strong>non-aeronautical revenue</strong>: instead of leasing retail and F&B space to third parties, they began directly owning and operating these businesses. This is Airport Business 101 — landing fees and passenger charges are regulated and capped; the real money is in retail, food, advertising, and parking.</p>

          <h3 class="text-slate-100 dark:text-gray-900" style="margin-top:1rem">The Navi Mumbai Bonus</h3>
          <p>Control of MIAL came with a significant sweetener: the upcoming <strong>Navi Mumbai International Airport</strong> project. This gave Adani not one but two major airports in India’s financial capital, with the ability to coordinate operations and potentially influence pricing across both facilities — an extraordinary position for a group that entered the airport business in 2019.</p>

          <h3 class="text-slate-100 dark:text-gray-900" style="margin-top:1rem">Adani’s Airport Empire by 2021</h3>
          <ul>
            <li><strong class="text-slate-200 dark:text-gray-800">Mumbai</strong> — India’s second-busiest</li>
            <li><strong class="text-slate-200 dark:text-gray-800">Ahmedabad, Lucknow, Mangaluru, Jaipur, Guwahati, Thiruvananthapuram</strong> — won via PPP bids</li>
            <li><strong class="text-slate-200 dark:text-gray-800">Navi Mumbai</strong> — under development</li>
          </ul>
          <p>This rapid consolidation made Adani India’s largest private airport operator — in under two years.</p>

          <div class="section-divider"></div>

          <h3 class="text-slate-100 dark:text-gray-900">&#9878; Two Narratives, Same Facts</h3>

          <div class="two-col">
            <div class="col-box col-box-green">
              <p class="text-xs font-bold text-green-400 dark:text-green-700 uppercase tracking-wide mb-2">&#9989; The Supporters’ View</p>

          <p class="leading-relaxed mb-4 text-slate-300 dark:text-gray-600">Picture this: you sell a property for &#8377;6 crore that you bought for &#8377;34 lakhs back in 2002. Sweet profit. Now imagine claiming a tax exemption on &#8377;4 crore of those capital gains — and having the tax department fight you tooth and nail, calling it a <em>&#8220;colourable device&#8221;</em> to evade tax. Welcome to the world of Kavita Damani, whose victory at the Mumbai Income Tax Tribunal has become a landmark case every property investor needs to know about.</p>

          <h3 class="text-slate-100 dark:text-gray-900">&#128205; The Setup: A Property Deal Under the Scanner</h3>
          <p>The story begins in 2002 when Kavita and her husband Manoj jointly purchased two flats (402A and 402B) at Glen Classic CHS Ltd., Hiranandani, Powai. Fast forward to 2017 — Manoj gifted his 50% share to Kavita through a registered gift deed. By 2020, Kavita sold both properties for <strong class="text-slate-100 dark:text-gray-900">&#8377;5.98 crore</strong>, earning capital gains of <strong class="text-slate-100 dark:text-gray-900">&#8377;4.21 crore</strong>.</p>
